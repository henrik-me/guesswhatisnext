name: Load Tests

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: >
          Target URL for load tests (leave empty to start a local server)
        required: false
        type: string
        default: ''
      test_suite:
        description: 'Test suite to run'
        required: true
        type: choice
        options:
          - all
          - api
          - websocket
        default: all
  schedule:
    # Weekly on Sundays at 03:00 UTC
    - cron: '0 3 * * 0'

concurrency:
  group: load-test
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  load-test:
    name: Artillery Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NODE_ENV: test
      # Dev/test default only — not used in production. Production values are in GitHub Secrets.
      JWT_SECRET: ci-load-test-secret
      SYSTEM_API_KEY: ci-load-test-system-key

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      # Lockfile generated on Windows lacks Linux-specific optional deps;
      # delete and reinstall to resolve correctly on CI.
      - run: rm -f package-lock.json && npm install --ignore-scripts && npm rebuild

      - name: Determine target URL
        id: target
        run: |
          if [ -n "$INPUT_TARGET_URL" ]; then
            DELIM="EOF_$(head -c 16 /dev/urandom | base64 | tr -dc 'A-Za-z0-9')"
            {
              echo "url<<$DELIM"
              echo "$INPUT_TARGET_URL"
              echo "$DELIM"
              echo 'local=false'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo 'url=http://localhost:3000'
              echo 'local=true'
            } >> "$GITHUB_OUTPUT"
          fi
        env:
          INPUT_TARGET_URL: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_url) || '' }}

      - name: Start local server
        if: steps.target.outputs.local == 'true'
        run: |
          node server/index.js &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

          # Wait for the server to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server failed to start within 30 seconds"
          exit 1
        env:
          PORT: 3000

      - name: Determine test suite
        id: suite
        run: echo "suite=${INPUT_SUITE:-all}" >> "$GITHUB_OUTPUT"
        env:
          INPUT_SUITE: ${{ (github.event_name == 'workflow_dispatch' && inputs.test_suite) || 'all' }}

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run API load tests
        if: steps.suite.outputs.suite == 'api' || steps.suite.outputs.suite == 'all'
        run: |
          npx artillery run \
            --target "$TARGET_URL" \
            --output reports/api-stress-report.json \
            tests/load/api-stress.yml
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
          LOAD_TEST_TARGET: ${{ steps.target.outputs.url }}

      - name: Run WebSocket load tests
        if: always() && (steps.suite.outputs.suite == 'websocket' || steps.suite.outputs.suite == 'all')
        run: |
          npx artillery run \
            --target "$TARGET_URL" \
            --output reports/websocket-stress-report.json \
            tests/load/websocket-stress.yml
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
          LOAD_TEST_TARGET: ${{ steps.target.outputs.url }}

      - name: Generate HTML reports
        if: always()
        run: |
          for f in reports/*.json; do
            [ -f "$f" ] && npx artillery report --output "${f%.json}.html" "$f" || true
          done

      - name: Create job summary
        if: always()
        run: |
          echo "## 🔫 Load Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | \`${TARGET_URL}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | \`${TEST_SUITE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for f in reports/*.json; do
            [ -f "$f" ] || continue
            SUITE_NAME=$(basename "$f" .json | sed 's/-report//')
            echo "### 📊 ${SUITE_NAME}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            # Extract metrics via Node for reliable JSON parsing
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('$f', 'utf8'));
              const agg = data.aggregate || {};
              const counters = agg.counters || {};
              const summaries = agg.summaries || {};

              // --- Total run duration ---
              const firstTs = agg.firstCounterAt || agg.firstHistogramAt;
              const lastTs = agg.lastCounterAt || agg.lastHistogramAt;
              let durationStr = 'N/A';
              if (firstTs && lastTs) {
                const durMs = new Date(lastTs).getTime() - new Date(firstTs).getTime();
                const durSec = Math.round(durMs / 1000);
                const mins = Math.floor(durSec / 60);
                const secs = durSec % 60;
                durationStr = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';
              }

              // --- Error rate ---
              const vusCreated = counters['vusers.created'] || 0;
              const vusFailed = counters['vusers.failed'] || 0;
              const vusCompleted = counters['vusers.completed'] || 0;
              const errorRate = vusCreated > 0 ? ((vusFailed / vusCreated) * 100).toFixed(1) : '0.0';

              // --- Response time metrics ---
              const p95 = summaries['http.response_time']?.p95
                ?? summaries['plugins.metrics-by-endpoint.response_time./api/scores/leaderboard']?.p95
                ?? 'N/A';
              const p99 = summaries['http.response_time']?.p99 ?? 'N/A';
              const median = summaries['http.response_time']?.median ?? 'N/A';

              // --- HTTP status codes ---
              const codes = Object.entries(counters)
                .filter(([k]) => k.startsWith('http.codes.'))
                .map(([k, v]) => k.replace('http.codes.', '') + ': ' + v)
                .join(', ') || 'N/A';

              const reqTotal = counters['http.requests'] ?? counters['http.responses'] ?? 'N/A';
              const errors = Object.entries(counters)
                .filter(([k]) => k.startsWith('errors.'))
                .map(([k, v]) => k.replace('errors.', '') + ': ' + v)
                .join(', ');

              // --- Overview table ---
              console.log('**Overview**');
              console.log('');
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              console.log('| Total run duration | ' + durationStr + ' |');
              console.log('| VUs created | ' + vusCreated + ' |');
              console.log('| VUs completed | ' + vusCompleted + ' |');
              console.log('| VUs failed | ' + vusFailed + ' |');
              console.log('| Error rate | ' + errorRate + '% |');
              console.log('| Total requests | ' + reqTotal + ' |');
              console.log('| HTTP status codes | ' + codes + ' |');
              console.log('| Response time p95 | ' + p95 + ' ms |');
              console.log('| Response time p99 | ' + p99 + ' ms |');
              console.log('| Response time median | ' + median + ' ms |');
              if (errors) console.log('| Errors | ' + errors + ' |');
              console.log('');

              // --- Per-scenario breakdown ---
              const scenarioCounters = Object.entries(counters)
                .filter(([k]) => k.startsWith('vusers.created_by_name.'));
              if (scenarioCounters.length > 0) {
                console.log('**Per-scenario breakdown**');
                console.log('');
                console.log('| Scenario | Created | Completed | Failed |');
                console.log('|----------|---------|-----------|--------|');
                for (const [k, created] of scenarioCounters) {
                  const name = k.replace('vusers.created_by_name.', '');
                  const completed = counters['vusers.completed_by_name.' + name] || 0;
                  const failed = counters['vusers.failed_by_name.' + name] || 0;
                  console.log('| ' + name + ' | ' + created + ' | ' + completed + ' | ' + failed + ' |');
                }
                console.log('');
              }

              // --- WS-specific metrics (for websocket reports) ---
              const wsMsgSent = counters['websocket.messages_sent'] ?? null;
              const wsSessionLen = summaries['websocket.session_length']?.p95 ?? null;
              const wsConnectTime = summaries['ws.connect_time']?.p95 ?? null;
              const wsSessionDuration = summaries['ws.session_duration']?.p95 ?? null;

              if (wsMsgSent !== null || wsSessionLen !== null || wsConnectTime !== null || wsSessionDuration !== null) {
                console.log('**WebSocket metrics**');
                console.log('');
                console.log('| Metric | Value |');
                console.log('|--------|-------|');
                if (wsMsgSent !== null) console.log('| Messages sent | ' + wsMsgSent + ' |');
                if (wsSessionLen !== null) console.log('| Session length p95 | ' + wsSessionLen + ' ms |');
                if (wsConnectTime !== null) console.log('| Connect time p95 | ' + wsConnectTime + ' ms |');
                if (wsSessionDuration !== null) console.log('| Session duration p95 | ' + wsSessionDuration + ' ms |');
                const wsSessionP99 = summaries['ws.session_duration']?.p99 ?? null;
                if (wsSessionP99 !== null) console.log('| Session duration p99 | ' + wsSessionP99 + ' ms |');
                console.log('');
              }

              // --- 429 annotation ---
              const has429 = counters['http.codes.429'] > 0;
              if (has429) {
                console.log('> **Note:** 429 responses are expected from rate-limit validation in the auth dance scenario.');
                console.log('');
              }

              // --- Custom auth metrics (if present) ---
              const authRateLimited = counters['auth.rate_limited'] ?? null;
              const authRetrySuccess = counters['auth.retry_after_success'] ?? null;
              const authRegisterSuccess = counters['auth.register_success'] ?? null;
              const authImmediateBlocked = counters['auth.immediate_retry_blocked'] ?? null;
              const authImmediateLeaked = counters['auth.immediate_retry_leaked'] ?? null;
              if (authRateLimited !== null || authRetrySuccess !== null || authRegisterSuccess !== null) {
                console.log('**Auth rate-limit dance metrics**');
                console.log('');
                console.log('| Metric | Value |');
                console.log('|--------|-------|');
                if (authRegisterSuccess !== null) console.log('| Registrations (direct) | ' + authRegisterSuccess + ' |');
                if (authRateLimited !== null) console.log('| Rate-limited (429) | ' + authRateLimited + ' |');
                if (authImmediateBlocked !== null) console.log('| Immediate retry blocked (expected) | ' + authImmediateBlocked + ' |');
                if (authImmediateLeaked !== null) console.log('| Immediate retry leaked (unexpected) | ' + authImmediateLeaked + ' |');
                if (authRetrySuccess !== null) console.log('| Retry-After successes | ' + authRetrySuccess + ' |');
                const retryP95 = summaries['auth.retry_after_seconds']?.p95 ?? null;
                if (retryP95 !== null) console.log('| Retry-After p95 | ' + retryP95 + 's |');
                console.log('');
              }
            " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "_Could not parse report._" >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
          TEST_SUITE: ${{ steps.suite.outputs.suite }}

      - name: Validate pass rate
        if: always()
        run: |
          FAILED=0
          for f in reports/*.json; do
            [ -f "$f" ] || continue
            SUITE_NAME=$(basename "$f" .json | sed 's/-report//')
            if ! RESULT=$(node -e "
              const data = JSON.parse(require('fs').readFileSync('$f', 'utf8'));
              const c = data.aggregate?.counters || {};
              const vuFailed = c['vusers.failed'] || 0;
              const vuCreated = c['vusers.created'] || 0;
              const vuCompleted = c['vusers.completed'] || 0;
              // Scenario-level failure details
              const failedScenarios = Object.entries(c)
                .filter(([k, v]) => k.startsWith('vusers.failed_by_name.') && v > 0)
                .map(([k, v]) => k.replace('vusers.failed_by_name.', '') + '=' + v);
              console.log(JSON.stringify({ vuFailed, vuCreated, vuCompleted, failedScenarios }));
            "); then
              echo "::error::Failed to read or parse report: $f"
              FAILED=1
              continue
            fi

            VU_FAILED=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.vuFailed)")
            VU_CREATED=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.vuCreated)")
            VU_COMPLETED=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.vuCompleted)")
            FAILED_SCENARIOS=$(echo "$RESULT" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); console.log(d.failedScenarios.join(', ') || 'none')")

            if [ "$VU_FAILED" -gt 0 ] 2>/dev/null; then
              echo "::error::${SUITE_NAME}: ${VU_FAILED}/${VU_CREATED} VUs failed (completed: ${VU_COMPLETED}, failed scenarios: ${FAILED_SCENARIOS})"
              FAILED=1
            else
              echo "✅ ${SUITE_NAME}: ${VU_COMPLETED}/${VU_CREATED} VUs completed, 0 failures"
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "::error::One or more test suites had VU failures — see above for details"
            exit 1
          fi

      - name: Upload Artillery reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: artillery-reports
          path: reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Stop local server
        if: always() && steps.target.outputs.local == 'true'
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi
