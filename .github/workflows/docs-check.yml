name: Docs Consistency

# CS43-7: strict mode — errors fail the job.
# Deliberately has no `paths-ignore`: this workflow MUST run on docs-only
# PRs — that is exactly the gap the CS43 doc-currency clickstop closes.
on:
  pull_request:
    branches: [main]

concurrency:
  group: docs-check-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Run check-docs-consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Run docs consistency check
        # CS43-7: strict mode. Non-zero exit (any error-severity finding)
        # fails the job. Baseline on main is zero findings as of CS43-6.
        run: npm run check:docs:strict
