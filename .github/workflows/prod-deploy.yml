name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: >
          Docker image tag to deploy (short SHA from staging, e.g. "40ef2f8").
          Must be an image that passed the Ephemeral Smoke Test job (in
          `.github/workflows/staging-deploy.yml`) and local `npm run container:validate`
          cycles per [INSTRUCTIONS.md § Database & Data](../../INSTRUCTIONS.md#database--data).
        required: true
        type: string
      confirm:
        description: 'Type "production" to confirm deployment'
        required: true
        type: string

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/henrik-me/guesswhatisnext

permissions:
  contents: write
  packages: read

jobs:
  validate-inputs:
    name: Validate Deployment Inputs
    runs-on: ubuntu-latest
    outputs:
      commit-sha: ${{ steps.resolve.outputs.commit-sha }}
    steps:
      - name: Confirm production intent
        run: |
          if [ "${{ inputs.confirm }}" != "production" ]; then
            echo "::error::Confirmation failed — type 'production' to proceed."
            exit 1
          fi

      - name: Validate image tag format
        run: |
          if ! echo "${{ inputs.image-tag }}" | grep -qE '^[0-9a-f]{7,40}$'; then
            echo "::error::Image tag must be a valid commit SHA (7-40 hex chars). Got: '${{ inputs.image-tag }}'"
            exit 1
          fi

      - name: Verify image exists in GHCR
        run: |
          IMAGE_PATH="${IMAGE_NAME#${REGISTRY}/}"
          echo "Checking for image $IMAGE_NAME:${{ inputs.image-tag }}"

          # GHCR requires Docker Registry V2 token exchange:
          # 1. Authenticate with token service to get bearer token
          # 2. Use bearer token to query manifests
          TOKEN=$(curl -s --connect-timeout 10 --max-time 30 \
            -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "https://${REGISTRY}/token?service=${REGISTRY}&scope=repository:${IMAGE_PATH}:pull" \
            | jq -r '.token // empty')

          if [ -z "$TOKEN" ]; then
            echo "::error::Failed to obtain GHCR auth token. Verify the workflow has packages:read permission."
            exit 1
          fi

          RESPONSE=$(curl -s --connect-timeout 10 --max-time 30 -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
            "https://${REGISTRY}/v2/${IMAGE_PATH}/manifests/${{ inputs.image-tag }}")
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Image verified in GHCR (HTTP $RESPONSE)"
            exit 0
          fi

          if [ "$RESPONSE" = "401" ]; then
            echo "::error::Unauthorized when checking image in GHCR (HTTP $RESPONSE). Verify the workflow has packages:read permission and the package is visible to this repository."
            exit 1
          fi

          if [ "$RESPONSE" = "404" ]; then
            echo "::error::Image tag '${{ inputs.image-tag }}' not found in GHCR. Deploy only images that passed the Ephemeral Smoke Test job (staging-deploy.yml) and local container:validate cycles."
            exit 1
          fi

          echo "::error::Failed to verify image '${{ inputs.image-tag }}' in GHCR (HTTP $RESPONSE). Aborting deployment."
          exit 1

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Guard rail — APPLICATIONINSIGHTS env var present in BOTH templates
        run: |
          # Count only the env-entry form so the guard step's own message text
          # cannot satisfy the threshold. Must appear exactly twice (happy-path
          # deploy template + rollback deploy template).
          COUNT=$(grep -c "^[[:space:]]*- name: APPLICATIONINSIGHTS_CONNECTION_STRING$" .github/workflows/prod-deploy.yml || true)
          if [ "$COUNT" -ne 2 ]; then
            echo "::error::Expected APPLICATIONINSIGHTS_CONNECTION_STRING env entry in BOTH happy-path and rollback templates (found $COUNT, expected 2)."
            exit 1
          fi
          echo "Guard pass: APPLICATIONINSIGHTS_CONNECTION_STRING env entry present in both templates ($COUNT occurrences)."

      - name: Resolve commit SHA from image tag
        id: resolve
        run: |
          COMMIT_SHA=$(git rev-parse "${{ inputs.image-tag }}^{commit}" 2>/dev/null || git rev-parse "${{ inputs.image-tag }}" 2>/dev/null)
          if [ -z "$COMMIT_SHA" ]; then
            echo "::error::Could not resolve commit for image tag '${{ inputs.image-tag }}'"
            exit 1
          fi
          echo "commit-sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag '${{ inputs.image-tag }}' → $COMMIT_SHA"

  deploy-azure-production:
    name: Deploy to Azure Production
    needs: validate-inputs
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Capture current image for rollback
        id: rollback
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            CURRENT=$(az containerapp show \
              --name gwn-production \
              --resource-group gwn-rg \
              --query "properties.template.containers[0].image" -o tsv)
            echo "current-image=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Current image (rollback target): $CURRENT"

      - name: Configure GHCR registry credentials
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            az containerapp registry set \
              --name gwn-production \
              --resource-group gwn-rg \
              --server ghcr.io \
              --username ${{ vars.GHCR_USERNAME }} \
              --password ${{ secrets.GHCR_PAT }}

      - name: Ensure Container App is running
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            STATUS=$(az containerapp show --name gwn-production --resource-group gwn-rg \
              --query "properties.runningStatus" -o tsv 2>/dev/null || echo "Unknown")
            echo "Container App status: $STATUS"
            if [ "$STATUS" != "Running" ]; then
              echo "Starting Container App..."
              RESOURCE_ID=$(az containerapp show --name gwn-production --resource-group gwn-rg --query "id" -o tsv)
              az rest --method POST \
                --url "https://management.azure.com${RESOURCE_ID}/start?api-version=2024-03-01"
              # Poll until Running (timeout after 90s)
              for i in $(seq 1 6); do
                sleep 15
                STATUS=$(az containerapp show --name gwn-production --resource-group gwn-rg \
                  --query "properties.runningStatus" -o tsv 2>/dev/null || echo "Unknown")
                echo "  Poll $i: $STATUS"
                if [ "$STATUS" = "Running" ]; then break; fi
              done
              if [ "$STATUS" != "Running" ]; then
                echo "::error::Container App failed to reach Running state (current: $STATUS)"
                exit 1
              fi
              echo "Container App started"
            fi

      # CS41-4: Apply DB migrations BEFORE traffic is shifted to the new
      # revision. `prod-deploy.yml` runs in single-revision mode, so the
      # `az containerapp update` step below moves traffic atomically — there
      # is no post-deploy window to land schema changes safely. Running the
      # idempotent migration script now means a migration failure aborts the
      # deploy without ever serving the new image.
      - name: Checkout repo (for scripts/migrate.js)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate-inputs.outputs.commit-sha }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (production only)
        run: npm ci --omit=dev

      # CS41-12 prep: capture the currently-serving (OLD) revision BEFORE
      # the migration runs. Prod is single-revision mode, so once
      # `az containerapp update` lands the new image, traffic shifts
      # atomically — there is no post-update opportunity to verify the
      # OLD code against the NEW schema. We capture now so the post-migration
      # smoke (next step) can probe the OLD revision's direct FQDN while
      # it is still serving traffic.
      #
      # First-deploy edge case: if no revision exists yet (latestRevisionName
      # empty / FQDN missing), CS41-12 is skipped with a notice — there is
      # no OLD server to break.
      - name: Capture old revision (CS41-12 prep)
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            OLD_NAME=$(az containerapp show --name gwn-production --resource-group gwn-rg \
              --query "properties.latestRevisionName" -o tsv 2>/dev/null || echo "")
            if [ -z "$OLD_NAME" ] || [ "$OLD_NAME" = "None" ]; then
              echo "::notice::No existing revision found — skipping CS41-12 (first deploy)."
              echo "OLD_REVISION_NAME=" >> "$GITHUB_ENV"
              echo "OLD_REVISION_FQDN=" >> "$GITHUB_ENV"
              exit 0
            fi
            OLD_FQDN=$(az containerapp revision show \
              --name gwn-production --resource-group gwn-rg \
              --revision "$OLD_NAME" \
              --query "properties.fqdn" -o tsv 2>/dev/null || echo "")
            if [ -z "$OLD_FQDN" ] || [ "$OLD_FQDN" = "None" ]; then
              echo "::warning::Could not resolve FQDN for $OLD_NAME — CS41-12 will skip."
              echo "OLD_REVISION_NAME=" >> "$GITHUB_ENV"
              echo "OLD_REVISION_FQDN=" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "OLD_REVISION_NAME=$OLD_NAME" >> "$GITHUB_ENV"
            echo "OLD_REVISION_FQDN=$OLD_FQDN" >> "$GITHUB_ENV"
            echo "Captured OLD revision: $OLD_NAME ($OLD_FQDN)"

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::secrets.DATABASE_URL is unset; cannot apply prod migrations."
            exit 1
          fi
          node scripts/migrate.js || {
            echo "::error::Migration failed; aborting deploy before traffic shift"
            exit 1
          }

      # CS41-12: smoke the OLD revision (still serving 100% of prod traffic)
      # against the just-migrated DB BEFORE we ship the new image. This catches
      # backward-incompatibility that the static linter (CS41-11) cannot:
      #   - subtle query-shape changes (e.g. SELECT * widening unexpectedly)
      #   - app-side schema introspection that breaks on new structure
      #   - trigger / index / default-value side effects
      #
      # Failure mode here is NOT recoverable automatically:
      #   - the migration HAS been applied to the DB
      #   - the OLD revision CANNOT serve against the new schema
      #   - traffic shift to the NEW revision has NOT happened yet
      # Operator playbook (see PR body):
      #   (a) Roll forward urgently: re-run this workflow from the
      #       "Deploy to production Container App" step (or invoke
      #       `az containerapp update` manually) to land the new image.
      #       Service is degraded for the gap window.
      #   (b) Manually revert the migration with hand-written inverse SQL.
      #       Migrations are forward-only, so this is HARD; prefer (a)
      #       unless the migration itself is also broken.
      # Cold-start: the OLD revision may have scaled to zero. smoke.js
      # already tolerates 503+Retry-After up to WARMUP_CAP_MS+COLD_START_MS,
      # so we reuse the same budget as CS41-1 (steps.smoke env below).
      - name: Smoke OLD revision against NEW schema (CS41-12)
        if: env.OLD_REVISION_FQDN != ''
        env:
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD_PROD }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          WARMUP_CAP_MS: '30000'
          COLD_START_MS: '30000'
          PERF_WARN_MS: '2000'
        run: |
          if [ -z "$SMOKE_USER_PASSWORD" ]; then
            echo "::error::secrets.SMOKE_USER_PASSWORD_PROD is unset; cannot run CS41-12 old-revision smoke."
            exit 1
          fi
          node scripts/smoke.js "$OLD_REVISION_FQDN" || {
            echo "::error::CS41-12: MIGRATION BREAKS OLD SERVER — manual recovery required"
            echo "::error::The migration was applied to the DB, but old revision $OLD_REVISION_NAME cannot serve against the new schema."
            echo "::error::Operator must EITHER roll forward urgently (re-run from 'Deploy to production Container App') OR manually revert the migration with hand-written inverse SQL. See the CS41-12 operator playbook in the PR body."
            exit 1
          }
          echo "✅ CS41-12: OLD revision $OLD_REVISION_NAME serves cleanly against the migrated schema."

      - name: Deploy to production Container App
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            # Derive CANONICAL_HOST from PROD_URL (strip protocol and trailing path)
            CANONICAL_HOST=$(echo "$PROD_URL" | sed 's|^https\?://||' | sed 's|[/?#].*||' | sed 's|/$||')
            if [ -z "$CANONICAL_HOST" ]; then
              echo "::error::CANONICAL_HOST could not be derived from PROD_URL"
              exit 1
            fi
            echo "::add-mask::$CANONICAL_HOST"
            echo "CANONICAL_HOST derived successfully"

            trap 'rm -f /tmp/deploy-template.yaml' EXIT
            cat > /tmp/deploy-template.yaml <<YAMLEOF
            properties:
              template:
                containers:
                  - name: gwn-production
                    image: ${{ env.IMAGE_NAME }}:${{ inputs.image-tag }}
                    env:
                      - name: NODE_ENV
                        value: production
                      - name: PORT
                        value: "3000"
                      - name: JWT_SECRET
                        value: "${JWT_SECRET}"
                      - name: SYSTEM_API_KEY
                        value: "${SYSTEM_API_KEY}"
                      - name: GWN_DB_PATH
                        value: /tmp/game.db
                      - name: APPLICATIONINSIGHTS_CONNECTION_STRING
                        secretRef: appinsights-connection-string
                      - name: DATABASE_URL
                        value: "${DATABASE_URL}"
                      - name: CANONICAL_HOST
                        value: "${CANONICAL_HOST}"
                    resources:
                      cpu: 0.5
                      memory: 1Gi
            YAMLEOF
            az containerapp update \
              --name gwn-production \
              --resource-group gwn-rg \
              --min-replicas 1 \
              --max-replicas 5 \
              --yaml /tmp/deploy-template.yaml
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROD_URL: ${{ secrets.PROD_URL }}

      - name: Deactivate old revisions
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            LATEST=$(az containerapp show --name gwn-production --resource-group gwn-rg \
              --query "properties.latestRevisionName" -o tsv)
            echo "Latest revision: $LATEST"
            az containerapp revision list --name gwn-production --resource-group gwn-rg \
              --query "[?name!='$LATEST'].name" -o tsv | while read -r rev; do
              echo "Deactivating old revision: $rev"
              az containerapp revision deactivate --name gwn-production --resource-group gwn-rg \
                --revision "$rev" || true
            done

      - name: Wait for deployment to stabilize
        run: sleep 120

      # CS41-1 + CS41-2: deployed-revision smoke against the new revision's
      # direct FQDN. Prod runs in single-revision mode so `az containerapp
      # update` above already shifted traffic — if smoke fails, the existing
      # rollback step further down handles the recovery. Smoke validates the
      # full request/DB/auth path against THIS revision (not the public
      # ingress) so rollback diagnostics distinguish "new revision broken"
      # from "ingress / DNS / cert issue".
      - name: Get new revision FQDN (CS41-1)
        id: rev
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            REVISION=$(az containerapp show --name gwn-production --resource-group gwn-rg \
              --query "properties.latestRevisionName" -o tsv)
            FQDN=$(az containerapp revision show \
              --name gwn-production --resource-group gwn-rg \
              --revision "$REVISION" \
              --query "properties.fqdn" -o tsv)
            if [ -z "$FQDN" ] || [ "$FQDN" = "None" ]; then
              echo "::error::Could not resolve FQDN for revision $REVISION"
              exit 1
            fi
            echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
            echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
            echo "New revision: $REVISION  FQDN: $FQDN"

      - name: Smoke deployed revision (CS41-1+2)
        id: smoke
        env:
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD_PROD }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          WARMUP_CAP_MS: '30000'
          COLD_START_MS: '30000'
          PERF_WARN_MS: '2000'
          SMOKE_RESULTS_PATH: smoke-results.json
        run: |
          if [ -z "$SMOKE_USER_PASSWORD" ]; then
            echo "::error::secrets.SMOKE_USER_PASSWORD_PROD is unset; cannot run CS41-1 smoke. Operator action: set the secret per OPERATIONS.md."
            exit 1
          fi
          set +e
          node scripts/smoke.js "${{ steps.rev.outputs.fqdn }}"
          SMOKE_EXIT=$?
          set -e
          echo "smoke-exit=$SMOKE_EXIT" >> "$GITHUB_OUTPUT"
          # Do not exit non-zero here — render the summary first, then let
          # the dedicated "Fail if smoke failed" step gate the rollback.
          exit 0

      - name: AI telemetry verification (CS41-3)
        id: ai-verify
        # Only run when smoke succeeded. `continue-on-error: true` is
        # critical per CS41-3 plan: AI ingest delay is warning-only and
        # MUST NOT block a healthy deploy or trigger rollback. The
        # dedicated "Fail if smoke failed" gate (below) drives rollback
        # decisions; this step does not participate in that gate.
        if: steps.smoke.outputs.smoke-exit == '0'
        continue-on-error: true
        env:
          NEW_REVISION_NAME: ${{ steps.rev.outputs.revision }}
          AI_RESOURCE: gwn-ai-production
          RESOURCE_GROUP: gwn-rg
          EXPECTED_ROW_COUNT: '6'
          AI_VERIFY_OUTPUT_PATH: ai-verification.json
        run: node scripts/verify-ai.js

      - name: Render deploy summary (CS41-8)
        if: always()
        env:
          IMAGE_SHA: ${{ inputs.image-tag }}
          REVISION_NAME: ${{ steps.rev.outputs.revision }}
          MIGRATION_STATUS: applied
          ENVIRONMENT: production
          AI_VERIFICATION_PATH: ai-verification.json
        run: |
          if [ -f smoke-results.json ]; then
            node scripts/render-deploy-summary.js smoke-results.json >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Deploy Summary"
              echo ""
              echo "- **Environment:** \`production\`"
              echo "- **Image SHA:** \`${IMAGE_SHA}\`"
              echo "- **Revision:** \`${REVISION_NAME:-unknown}\`"
              echo "- **Smoke verdict:** ❌ smoke did not produce results (script crashed or env error)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload AI verification artifact (CS41-3)
        if: always() && hashFiles('ai-verification.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ai-verification-production-${{ github.run_id }}
          path: ai-verification.json
          retention-days: 90

      - name: Upload smoke results artifact (CS41-8)
        if: always() && hashFiles('smoke-results.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: smoke-results-production-${{ github.run_id }}
          path: smoke-results.json
          retention-days: 90

      - name: Fail if smoke failed (CS41-1)
        if: steps.smoke.outputs.smoke-exit != '0'
        run: |
          echo "::error::CS41-1 smoke failed against revision ${{ steps.rev.outputs.revision }} — rollback step (below) will fire."
          # Do not exit 1 here — the rollback step's `if:` already covers
          # this condition via the smoke-exit output. Failing here would
          # skip subsequent steps unless they all carry `if: always()`.

      - name: Verify production deployment
        id: healthcheck
        if: steps.smoke.outputs.smoke-exit == '0'
        # CS53-22: Two-phase verify that respects Policy 1 (do not require eager DB init)
        # and supports deploys when Azure SQL is in capacity-exhausted (unavailable) mode.
        #
        # Phase 1 (loop): probe /api/features to trigger lazy DB init OR confirm
        # intentional-unavailable handling. Outcomes:
        #   - 200                            → init_triggered (DB warm; assert db=ok in phase 2)
        #   - 503 + unavailable=true + no Retry-After → intentional_unavailable (assert app=ok only)
        #   - 503 + Retry-After present     → transient cold-start, keep retrying
        #   - anything else                  → unexpected, keep retrying within budget
        #
        # Phase 2: authoritative /api/health probe gated on the phase-1 verdict.
        run: |
          set -u
          PROD_URL="${{ secrets.PROD_URL }}"
          STATE="never_probed"
          BODY_FILE=$(mktemp)
          HDR_FILE=$(mktemp)
          for i in 1 2 3 4 5 6 7 8; do
            : > "$BODY_FILE"; : > "$HDR_FILE"
            HTTP_STATUS=$(curl -sS -o "$BODY_FILE" -D "$HDR_FILE" -w '%{http_code}' \
              --max-time 35 "$PROD_URL/api/features" 2>/dev/null || echo "000")

            UNAVAILABLE=$(jq -r '.unavailable // false' "$BODY_FILE" 2>/dev/null || echo "false")
            REASON=$(jq -r '.reason // ""' "$BODY_FILE" 2>/dev/null || echo "")
            HAS_RETRY_AFTER=$(grep -i '^retry-after:' "$HDR_FILE" >/dev/null 2>&1 && echo "yes" || echo "no")

            echo "Probe attempt $i: /api/features http=$HTTP_STATUS unavailable=$UNAVAILABLE reason='$REASON' retry_after=$HAS_RETRY_AFTER"

            if [ "$HTTP_STATUS" = "200" ]; then
              STATE="init_triggered"
              break
            fi
            if [ "$HTTP_STATUS" = "503" ] && [ "$UNAVAILABLE" = "true" ] && [ "$HAS_RETRY_AFTER" = "no" ]; then
              STATE="intentional_unavailable"
              break
            fi
            if [ "$HTTP_STATUS" = "503" ] && [ "$HAS_RETRY_AFTER" = "yes" ]; then
              STATE="transient_cold_start"
            else
              STATE="unexpected_$HTTP_STATUS"
            fi
            sleep 30
          done
          rm -f "$BODY_FILE" "$HDR_FILE"

          if [ "$STATE" != "init_triggered" ] && [ "$STATE" != "intentional_unavailable" ]; then
            echo "::warning::Phase 1 failed: final state='$STATE' (never reached a terminal verdict)"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Phase 2: authoritative /api/health probe.
          HEALTH_RESPONSE=$(curl -sf --max-time 30 \
            -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" \
            "$PROD_URL/api/health" 2>/dev/null) || HEALTH_RESPONSE=""
          HEALTH_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.status // "error"' 2>/dev/null || echo "error")
          DB_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.checks.database.status // "unknown"' 2>/dev/null || echo "unknown")
          echo "Authoritative /api/health: status=$HEALTH_STATUS db=$DB_STATUS"

          if [ "$HEALTH_STATUS" != "ok" ]; then
            echo "::warning::Phase 2 failed: /api/health status=$HEALTH_STATUS (need 'ok')"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$STATE" = "init_triggered" ] && [ "$DB_STATUS" != "ok" ]; then
            echo "::warning::Phase 2 failed: /api/features returned 200 but /api/health reports db=$DB_STATUS (expected 'ok')"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ Production deployment healthy (phase1=$STATE, health.status=ok, db=$DB_STATUS)"
          echo "healthy=true" >> "$GITHUB_OUTPUT"

      - name: Rollback on failure
        if: steps.smoke.outputs.smoke-exit != '0' || steps.healthcheck.outputs.healthy != 'true'
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            echo "::error::Rolling back to previous image: ${{ steps.rollback.outputs.current-image }}"
            # Derive CANONICAL_HOST from PROD_URL
            CANONICAL_HOST=$(echo "$PROD_URL" | sed 's|^https\?://||' | sed 's|[/?#].*||' | sed 's|/$||')
            if [ -z "$CANONICAL_HOST" ]; then
              echo "::error::CANONICAL_HOST could not be derived from PROD_URL during rollback"
              exit 1
            fi

            trap 'rm -f /tmp/deploy-template.yaml' EXIT
            cat > /tmp/deploy-template.yaml <<YAMLEOF
            properties:
              template:
                containers:
                  - name: gwn-production
                    image: ${{ steps.rollback.outputs.current-image }}
                    env:
                      - name: NODE_ENV
                        value: production
                      - name: PORT
                        value: "3000"
                      - name: JWT_SECRET
                        value: "${JWT_SECRET}"
                      - name: SYSTEM_API_KEY
                        value: "${SYSTEM_API_KEY}"
                      - name: GWN_DB_PATH
                        value: /tmp/game.db
                      - name: APPLICATIONINSIGHTS_CONNECTION_STRING
                        secretRef: appinsights-connection-string
                      - name: DATABASE_URL
                        value: "${DATABASE_URL}"
                      - name: CANONICAL_HOST
                        value: "${CANONICAL_HOST}"
                    resources:
                      cpu: 0.5
                      memory: 1Gi
            YAMLEOF
            az containerapp update \
              --name gwn-production \
              --resource-group gwn-rg \
              --yaml /tmp/deploy-template.yaml
            echo "Waiting for rollback to stabilize..."
            sleep 60
            HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
              -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" \
              "${{ secrets.PROD_URL }}/api/health" || true)
            echo "Rollback health check: $HTTP_STATUS"

            # Deactivate the failed revision after rollback
            FAILED_REVISION=$(az containerapp revision list \
              --name gwn-production \
              --resource-group gwn-rg \
              --query "[?properties.template.containers[0].image=='$IMAGE_NAME:${{ inputs.image-tag }}'].name | [0]" -o tsv 2>/dev/null || true)
            if [ -n "$FAILED_REVISION" ]; then
              az containerapp revision deactivate \
                --name gwn-production \
                --resource-group gwn-rg \
                --revision "$FAILED_REVISION" || true
              echo "🧹 Deactivated failed revision: $FAILED_REVISION"
            fi
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROD_URL: ${{ secrets.PROD_URL }}

      # CS41-5: rollback verification with explicit revision targeting.
      # After the existing rollback step has shifted prod traffic back to the
      # prior image, this step re-runs the CS41-1 smoke and CS41-3 AI verify
      # AGAINST the rolled-back revision specifically (not the public ingress
      # in the abstract). Two independent reasons:
      #   1. Confirm the rollback actually produced a healthy serving state —
      #      otherwise the apex is in an indeterminate condition (both new
      #      and rollback revision broken) and an operator must intervene.
      #   2. Tag AI telemetry to the rollback revision's `cloud_RoleInstance`
      #      so post-incident forensics can distinguish rollback-driven
      #      requests from the failed deploy's earlier requests.
      #
      # AI verify here is warning-only (same contract as CS41-3): a delayed
      # AI ingest does NOT undo a successful rollback smoke. Smoke failure,
      # however, is a HARD failure with a distinct operator-grep marker
      # ("ROLLBACK TARGET ALSO UNHEALTHY") to differentiate this incident
      # mode from CS41-12's "MIGRATION BREAKS OLD SERVER" — operator
      # playbook is different.
      - name: Rollback verification (CS41-5)
        if: steps.smoke.outputs.smoke-exit != '0' || steps.healthcheck.outputs.healthy != 'true'
        env:
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD_PROD }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          WARMUP_CAP_MS: '30000'
          COLD_START_MS: '30000'
          PERF_WARN_MS: '2000'
          AI_RESOURCE: gwn-ai-production
          RESOURCE_GROUP: gwn-rg
          EXPECTED_ROW_COUNT: '6'
        run: |
          # Allow Azure ingress to settle on the rolled-back revision.
          # The rollback step already slept 60s after `az containerapp update`
          # and verified /api/health; this small additional buffer protects
          # against a race where revision-list still reports the failed
          # revision at weight=100 for a few seconds after rollback.
          sleep 15

          ROLLBACK_REVISION_NAME=$(az containerapp show \
            --name gwn-production --resource-group gwn-rg \
            --query "properties.configuration.ingress.traffic[?weight==\`100\`].revisionName | [0]" -o tsv 2>/dev/null || echo "")
          ROLLBACK_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -z "$ROLLBACK_REVISION_NAME" ] || [ "$ROLLBACK_REVISION_NAME" = "None" ]; then
            echo "::warning::CS41-5: could not resolve rollback revision name (no traffic at weight=100). Skipping rollback verification — likely first-ever deploy or rollback step itself failed; the existing 'Fail if unhealthy' gate below still fires."
            exit 0
          fi

          ROLLBACK_FQDN=$(az containerapp revision show \
            --name gwn-production --resource-group gwn-rg \
            --revision "$ROLLBACK_REVISION_NAME" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")
          if [ -z "$ROLLBACK_FQDN" ] || [ "$ROLLBACK_FQDN" = "None" ]; then
            echo "::warning::CS41-5: could not resolve FQDN for rollback revision $ROLLBACK_REVISION_NAME. Skipping rollback verification — operator must verify manually."
            exit 0
          fi

          echo "::notice::CS41-5: rollback target revision=$ROLLBACK_REVISION_NAME fqdn=$ROLLBACK_FQDN at $ROLLBACK_TIMESTAMP"

          if [ -z "$SMOKE_USER_PASSWORD" ]; then
            echo "::warning::CS41-5: SMOKE_USER_PASSWORD_PROD unset — cannot run smoke against rollback target. Operator must verify manually."
            exit 0
          fi

          # 1. Smoke against the rollback target. If THIS fails, both the
          # new revision (deploy-time smoke) AND the rollback target are
          # broken — indeterminate state; operator must intervene.
          if ! SMOKE_RESULTS_PATH=rollback-smoke-results.json node scripts/smoke.js "$ROLLBACK_FQDN"; then
            echo "::error::CS41-5: ROLLBACK TARGET ALSO UNHEALTHY — operator intervention required"
            echo "::error::Rolled-back revision $ROLLBACK_REVISION_NAME failed CS41-1 smoke at $ROLLBACK_TIMESTAMP."
            echo "::error::Service is in an indeterminate state: both the new revision (failed deploy) and the rollback target are broken."
            echo "::error::Do NOT auto-roll-forward — operator must investigate. See PR body operator playbook for CS41-5."
            exit 1
          fi

          # 2. AI verify on the rollback target (warning-only, mirrors CS41-3).
          # Captures `cloud_RoleInstance` for the rolled-back revision in the
          # post-rollback time window so forensics can attribute requests
          # cleanly. Failure here does NOT undo a successful rollback smoke.
          set +e
          NEW_REVISION_NAME="$ROLLBACK_REVISION_NAME" \
          AI_VERIFY_OUTPUT_PATH=rollback-ai-verification.json \
            node scripts/verify-ai.js
          AI_EXIT=$?
          set -e
          if [ "$AI_EXIT" -ne 0 ]; then
            echo "::warning::CS41-5: AI verification mechanism failed for rollback target $ROLLBACK_REVISION_NAME (exit $AI_EXIT). Rollback smoke succeeded; investigate AI access path separately."
          elif [ -f rollback-ai-verification.json ] && grep -q '"warning":[[:space:]]*true' rollback-ai-verification.json; then
            echo "::warning::CS41-5: AI ingest delayed for rollback target $ROLLBACK_REVISION_NAME — rollback succeeded but AI not yet reflecting rolled-back traffic. Investigate AI separately if delay persists > 15 min."
          fi

          echo "✅ CS41-5: rollback verification passed against $ROLLBACK_REVISION_NAME (smoke ok; AI exit=$AI_EXIT)"

      - name: Upload rollback smoke results artifact (CS41-5)
        if: always() && hashFiles('rollback-smoke-results.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: rollback-smoke-results-production-${{ github.run_id }}
          path: rollback-smoke-results.json
          retention-days: 90

      - name: Upload rollback AI verification artifact (CS41-5)
        if: always() && hashFiles('rollback-ai-verification.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: rollback-ai-verification-production-${{ github.run_id }}
          path: rollback-ai-verification.json
          retention-days: 90

      - name: Fail if unhealthy
        if: steps.smoke.outputs.smoke-exit != '0' || steps.healthcheck.outputs.healthy != 'true'
        run: |
          if [ "${{ steps.smoke.outputs.smoke-exit }}" != "0" ]; then
            echo "::error::Production deploy failed CS41-1 smoke and was rolled back."
          else
            echo "::error::Production deployment failed health checks and was rolled back."
          fi
          exit 1

  update-production-branch:
    name: Fast-Forward release/production
    needs: [deploy-azure-production, validate-inputs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Fast-forward release/production to deployed commit
        env:
          COMMIT_SHA: ${{ needs.validate-inputs.outputs.commit-sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Using commit $COMMIT_SHA for release/production (from image-tag='${{ inputs.image-tag }}')"

          if ! git ls-remote --exit-code origin refs/heads/release/production > /dev/null 2>&1; then
            echo "Creating release/production branch at $COMMIT_SHA"
            git checkout -b release/production "$COMMIT_SHA"
            git push origin release/production
          else
            echo "Fast-forwarding release/production to $COMMIT_SHA"
            git fetch origin release/production
            git checkout release/production
            git merge --ff-only "$COMMIT_SHA"
            git push origin release/production
          fi

  tag-deployment:
    name: Tag Production Deployment
    needs: [deploy-azure-production, validate-inputs]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get revision name
        id: rev
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            REVISION=$(az containerapp show --name gwn-production --resource-group gwn-rg \
              --query "properties.latestRevisionName" -o tsv)
            echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
            echo "Production revision: $REVISION"

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Push deployment tag
        run: |
          git tag "${{ steps.rev.outputs.revision }}" "${{ needs.validate-inputs.outputs.commit-sha }}"
          git push origin "${{ steps.rev.outputs.revision }}"
          echo "✅ Tagged commit ${{ needs.validate-inputs.outputs.commit-sha }} as ${{ steps.rev.outputs.revision }}"
