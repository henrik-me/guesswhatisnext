name: CI/CD Pipeline

on:
  push:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/henrik-me/guesswhatisnext

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Check for lint script
        id: has-lint
        run: |
          if npm run --silent lint --if-present 2>/dev/null; then
            echo "Lint passed or no lint script configured"
          fi

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npx vitest run
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          SYSTEM_API_KEY: ci-test-system-key

  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to staging Container App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name gwn-staging \
              --resource-group gwn-rg \
              --image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
              --set-env-vars \
                NODE_ENV=staging \
                PORT=3000 \
                JWT_SECRET=${{ secrets.JWT_SECRET }} \
                SYSTEM_API_KEY=${{ secrets.SYSTEM_API_KEY }}

      - name: Wait for deployment to stabilize
        run: sleep 30

  smoke-test-staging:
    name: Smoke Test Staging
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" \
            "${{ vars.STAGING_URL }}/api/health")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Register test user
        run: |
          TIMESTAMP=$(date +%s)
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "${{ vars.STAGING_URL }}/api/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"smoketest_${TIMESTAMP}\", \"password\": \"SmokeTest123!\"}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Register status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::User registration failed with status $HTTP_STATUS"
            echo "$BODY"
            exit 1
          fi
          TOKEN=$(echo "$BODY" | jq -r '.token')
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Submit test score
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "${{ vars.STAGING_URL }}/api/scores" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            -d '{"score": 100, "puzzleId": 1, "timeMs": 5000}')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Score submit status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Score submission failed with status $HTTP_STATUS"
            echo "$RESPONSE" | sed '$d'
            exit 1
          fi

  deploy-production:
    name: Deploy to Production
    needs: [build-and-push, smoke-test-staging]
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Capture current image for rollback
        id: current
        uses: azure/cli@v2
        with:
          inlineScript: |
            CURRENT_IMAGE=$(az containerapp show \
              --name gwn-production \
              --resource-group gwn-rg \
              --query "properties.template.containers[0].image" \
              -o tsv 2>/dev/null || echo "none")
            echo "image=$CURRENT_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to production Container App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name gwn-production \
              --resource-group gwn-rg \
              --image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
              --set-env-vars \
                NODE_ENV=production \
                PORT=3000 \
                JWT_SECRET=${{ secrets.JWT_SECRET }} \
                SYSTEM_API_KEY=${{ secrets.SYSTEM_API_KEY }}

      - name: Wait for deployment to stabilize
        run: sleep 30

    outputs:
      previous-image: ${{ steps.current.outputs.image }}

  verify-production:
    name: Verify Production
    needs: [build-and-push, deploy-production]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" \
            "${{ vars.PRODUCTION_URL }}/api/health")
          echo "Production health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Production health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Verify API responsiveness
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "${{ vars.PRODUCTION_URL }}/api/puzzles")
          echo "Puzzles endpoint status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Production API not responding correctly"
            exit 1
          fi

  rollback:
    name: Auto-Rollback Production
    needs: [deploy-production, verify-production]
    if: failure() && needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Rollback to previous image
        uses: azure/cli@v2
        with:
          inlineScript: |
            PREVIOUS_IMAGE="${{ needs.deploy-production.outputs.previous-image }}"
            if [ "$PREVIOUS_IMAGE" = "none" ] || [ -z "$PREVIOUS_IMAGE" ]; then
              echo "::warning::No previous image found, cannot rollback"
              exit 1
            fi
            echo "Rolling back to: $PREVIOUS_IMAGE"
            az containerapp update \
              --name gwn-production \
              --resource-group gwn-rg \
              --image "$PREVIOUS_IMAGE"

      - name: Verify rollback
        run: |
          sleep 30
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" \
            "${{ vars.PRODUCTION_URL }}/api/health")
          echo "Post-rollback health check: $HTTP_STATUS"

      - name: Create deployment failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Deployment failure: ${context.sha.substring(0, 7)} rolled back`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['deployment-failure'],
              body: [
                `## Deployment Failure`,
                ``,
                `**Commit:** ${context.sha}`,
                `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Previous image:** ${process.env.PREVIOUS_IMAGE || 'unknown'}`,
                `**Time:** ${new Date().toISOString()}`,
                ``,
                `Production verification failed after deployment. Auto-rollback was triggered.`,
                `Please investigate the workflow run logs for details.`,
              ].join('\n'),
            });
        env:
          PREVIOUS_IMAGE: ${{ needs.deploy-production.outputs.previous-image }}
