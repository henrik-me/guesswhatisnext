name: Health Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check health endpoint
        id: health
        run: |
          set +e
          RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 10 \
            -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" \
            "${{ vars.PRODUCTION_URL }}/api/health")
          CURL_EXIT=$?
          set -e

          if [ $CURL_EXIT -ne 0 ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "error=Connection failed (curl exit code: $CURL_EXIT)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "status=healthy" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "error=HTTP $HTTP_STATUS" >> "$GITHUB_OUTPUT"
          fi

      - name: Handle failure — create or update issue
        if: steps.health.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const error = '${{ steps.health.outputs.error }}';
            const title = `Service health issue: ${error}`;

            // Check for existing open service-health issues
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'service-health',
              state: 'open',
              per_page: 10,
            });

            const now = new Date().toISOString();
            const body = [
              `## Service Health Alert`,
              ``,
              `**Error:** ${error}`,
              `**Detected at:** ${now}`,
              `**Production URL:** ${{ vars.PRODUCTION_URL }}`,
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            if (existingIssues.length > 0) {
              // Update existing issue with a comment
              const issue = existingIssues[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `### Health check still failing\n\n**Error:** ${error}\n**Time:** ${now}`,
              });
              console.log(`Updated existing issue #${issue.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['service-health'],
                body: body,
              });
              console.log('Created new service health issue');
            }

      - name: Log success
        if: steps.health.outputs.status == 'healthy'
        run: echo "✅ Production health check passed"
