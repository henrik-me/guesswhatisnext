name: Health Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      check-level:
        description: 'Check level to run'
        required: true
        type: choice
        options:
          - azure-only
          - deep
        default: azure-only

permissions:
  issues: write

jobs:
  # Tier 1: Azure API checks — runs on cron, does NOT wake the container ($0 cost)
  azure-check:
    name: Azure Infrastructure Check
    runs-on: ubuntu-latest
    environment: production
    outputs:
      app-exists: ${{ steps.check.outputs.app-exists }}
      provisioning-state: ${{ steps.check.outputs.provisioning-state }}
      revision-health: ${{ steps.check.outputs.revision-health }}
      revision-name: ${{ steps.check.outputs.revision-name }}
      status: ${{ steps.check.outputs.status }}
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check Azure infrastructure
        id: check
        uses: azure/cli@v2
        with:
          inlineScript: |
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

            # Check container app exists and get provisioning state
            set +e
            PROV_STATE=$(az containerapp show --name gwn-production --resource-group gwn-rg --query "properties.provisioningState" -o tsv 2>&1)
            AZ_EXIT=$?
            set -e

            if [ "$AZ_EXIT" -ne 0 ]; then
              echo "app-exists=false" >> "$GITHUB_OUTPUT"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              if echo "$PROV_STATE" | grep -qi "ResourceNotFound"; then
                echo "error=Container app gwn-production not found" >> "$GITHUB_OUTPUT"
              else
                echo "error=Azure CLI error: $(echo "$PROV_STATE" | head -c 200)" >> "$GITHUB_OUTPUT"
              fi
              exit 0
            fi
            echo "app-exists=true" >> "$GITHUB_OUTPUT"
            echo "provisioning-state=$PROV_STATE" >> "$GITHUB_OUTPUT"
            echo "Provisioning state: $PROV_STATE"

            # Check latest revision
            ACTIVE_COUNT=$(az containerapp revision list --name gwn-production --resource-group gwn-rg --query "[?properties.active==\`true\`] | length(@)" -o tsv)
            LATEST_NAME=$(az containerapp revision list --name gwn-production --resource-group gwn-rg --query "sort_by(@, &properties.createdTime)[-1].name" -o tsv)
            LATEST_HEALTH=$(az containerapp revision list --name gwn-production --resource-group gwn-rg --query "sort_by(@, &properties.createdTime)[-1].properties.runningState" -o tsv)
            LATEST_PROV=$(az containerapp revision list --name gwn-production --resource-group gwn-rg --query "sort_by(@, &properties.createdTime)[-1].properties.provisioningState" -o tsv)
            LATEST_REPLICAS=$(az containerapp revision list --name gwn-production --resource-group gwn-rg --query "sort_by(@, &properties.createdTime)[-1].properties.replicas" -o tsv)
            LATEST_NAME=${LATEST_NAME:-none}
            LATEST_HEALTH=${LATEST_HEALTH:-unknown}
            LATEST_PROV=${LATEST_PROV:-unknown}
            LATEST_REPLICAS=${LATEST_REPLICAS:-0}

            echo "revision-name=$LATEST_NAME" >> "$GITHUB_OUTPUT"
            echo "revision-health=$LATEST_HEALTH" >> "$GITHUB_OUTPUT"
            echo "revision-prov=$LATEST_PROV" >> "$GITHUB_OUTPUT"
            echo "active-revisions=$ACTIVE_COUNT" >> "$GITHUB_OUTPUT"
            echo "replicas=$LATEST_REPLICAS" >> "$GITHUB_OUTPUT"

            echo "Latest revision: $LATEST_NAME (health=$LATEST_HEALTH, prov=$LATEST_PROV, replicas=$LATEST_REPLICAS)"
            echo "Active revisions: $ACTIVE_COUNT"

            # Determine status
            # Scale-to-zero is normal — 0 replicas with Running state is healthy
            if [ "$PROV_STATE" != "Succeeded" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "error=App provisioning state: $PROV_STATE" >> "$GITHUB_OUTPUT"
            elif [ "$LATEST_PROV" = "Failed" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "error=Latest revision $LATEST_NAME provisioning failed" >> "$GITHUB_OUTPUT"
            elif [ "$ACTIVE_COUNT" -eq 0 ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "error=No active revisions found" >> "$GITHUB_OUTPUT"
            elif [ "$LATEST_HEALTH" = "Failed" ] || [ "$LATEST_HEALTH" = "Degraded" ]; then
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "error=Latest revision $LATEST_NAME running state: $LATEST_HEALTH" >> "$GITHUB_OUTPUT"
            else
              echo "status=healthy" >> "$GITHUB_OUTPUT"
              echo "✅ Azure infrastructure healthy"
            fi

      - name: Alert on failure
        if: steps.check.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const timestamp = '${{ steps.check.outputs.timestamp }}';
            const error = '${{ steps.check.outputs.error }}';
            const provState = '${{ steps.check.outputs.provisioning-state }}';
            const revName = '${{ steps.check.outputs.revision-name }}';
            const revHealth = '${{ steps.check.outputs.revision-health }}';

            const title = `[Azure] Infrastructure issue: ${error}`.slice(0, 120);

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'service-health',
              state: 'open',
              per_page: 5,
            });

            const body = [
              `## Azure Infrastructure Alert`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Detected at** | ${timestamp} |`,
              `| **Check type** | Azure API (no container wake) |`,
              `| **Provisioning** | ${provState} |`,
              `| **Latest revision** | ${revName} |`,
              `| **Revision health** | ${revHealth} |`,
              `| **Error** | ${error} |`,
              `| **Workflow run** | [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
            ].join('\n');

            const matching = existing.filter(i => i.title.startsWith('[Azure]'));

            if (matching.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: matching[0].number,
                body: `### Azure check still failing\n\n**Time:** ${timestamp}\n**Error:** ${error}\n**Revision:** ${revName} (${revHealth})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['service-health'],
                body,
              });
            }

      - name: Log success
        if: steps.check.outputs.status == 'healthy'
        run: |
          echo "✅ Azure check passed"
          echo "  Revision: ${{ steps.check.outputs.revision-name }}"
          echo "  Health: ${{ steps.check.outputs.revision-health }}"
          echo "  Replicas: ${{ steps.check.outputs.replicas }}"

  # Tier 2: Deep HTTP checks — manual dispatch only, WILL wake the container
  deep-check:
    name: Deep Health Check (wakes container)
    if: github.event_name == 'workflow_dispatch' && inputs['check-level'] == 'deep'
    needs: azure-check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check health endpoint (with retries)
        id: health
        run: |
          PROD_URL="${{ secrets.PROD_URL }}"
          API_KEY="${{ secrets.SYSTEM_API_KEY }}"
          MAX_RETRIES=3
          RETRY_DELAY=10
          DEGRADED_THRESHOLD=5000

          for ATTEMPT in $(seq 1 $MAX_RETRIES); do
            echo "::group::Attempt $ATTEMPT of $MAX_RETRIES"
            set +e
            START_MS=$(date +%s%3N)
            RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 15 \
              -H "X-API-Key: $API_KEY" \
              "$PROD_URL/api/health")
            CURL_EXIT=$?
            END_MS=$(date +%s%3N)
            ELAPSED=$((END_MS - START_MS))
            set -e

            echo "Curl exit: $CURL_EXIT, Elapsed: ${ELAPSED}ms"

            if [ $CURL_EXIT -eq 0 ]; then
              HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | sed '$d')
              echo "HTTP $HTTP_STATUS — ${ELAPSED}ms"
              echo "$BODY" | head -c 500

              if [ "$HTTP_STATUS" = "200" ]; then
                echo "health_status=healthy" >> "$GITHUB_OUTPUT"
                echo "response_time=$ELAPSED" >> "$GITHUB_OUTPUT"
                echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
                BODY_ESCAPED=$(echo "$BODY" | tr '\n' ' ' | head -c 1000)
                echo "response_body=$BODY_ESCAPED" >> "$GITHUB_OUTPUT"

                if [ "$ELAPSED" -gt "$DEGRADED_THRESHOLD" ]; then
                  echo "::warning::Health endpoint responded in ${ELAPSED}ms (>${DEGRADED_THRESHOLD}ms threshold)"
                  echo "health_status=degraded" >> "$GITHUB_OUTPUT"
                fi
                echo "::endgroup::"
                break
              fi
            fi

            echo "::endgroup::"
            if [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            else
              echo "health_status=failed" >> "$GITHUB_OUTPUT"
              echo "response_time=$ELAPSED" >> "$GITHUB_OUTPUT"
              echo "http_status=${HTTP_STATUS:-0}" >> "$GITHUB_OUTPUT"
              echo "response_body=${BODY:-Connection failed (curl exit $CURL_EXIT)}" >> "$GITHUB_OUTPUT"
              echo "error=Health check failed after $MAX_RETRIES attempts (HTTP ${HTTP_STATUS:-N/A}, ${ELAPSED}ms)" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Deep check — verify puzzles endpoint
        id: puzzles
        if: steps.health.outputs.health_status == 'healthy' || steps.health.outputs.health_status == 'degraded'
        run: |
          PROD_URL="${{ secrets.PROD_URL }}"
          API_KEY="${{ secrets.SYSTEM_API_KEY }}"
          USERNAME="hm_probe_$(date +%s)"
          PASSWORD="healthcheck_$(date +%s%N | tail -c 8)"

          echo "::group::Register temp user"
          REG_RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 10 \
            -X POST "$PROD_URL/api/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$USERNAME\",\"password\":\"$PASSWORD\"}")
          REG_HTTP=$(echo "$REG_RESPONSE" | tail -1)
          REG_BODY=$(echo "$REG_RESPONSE" | sed '$d')
          echo "Register: HTTP $REG_HTTP"
          echo "::endgroup::"

          if [ "$REG_HTTP" != "201" ]; then
            echo "puzzles_status=failed" >> "$GITHUB_OUTPUT"
            echo "puzzles_error=Registration failed (HTTP $REG_HTTP)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TOKEN=$(echo "$REG_BODY" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)

          echo "::group::Fetch puzzles"
          set +e
          START_MS=$(date +%s%3N)
          PZ_RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 10 \
            -H "Authorization: Bearer $TOKEN" \
            "$PROD_URL/api/puzzles")
          PZ_EXIT=$?
          END_MS=$(date +%s%3N)
          PZ_ELAPSED=$((END_MS - START_MS))
          set -e

          PZ_HTTP=$(echo "$PZ_RESPONSE" | tail -1)
          PZ_BODY=$(echo "$PZ_RESPONSE" | sed '$d')
          echo "Puzzles: HTTP $PZ_HTTP — ${PZ_ELAPSED}ms"
          echo "::endgroup::"

          if [ "$PZ_EXIT" -ne 0 ] || [ "$PZ_HTTP" != "200" ]; then
            echo "puzzles_status=failed" >> "$GITHUB_OUTPUT"
            echo "puzzles_error=Puzzles endpoint failed (HTTP ${PZ_HTTP:-N/A})" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$PZ_BODY" | grep -q '^\[.\+\]$'; then
            echo "puzzles_status=ok" >> "$GITHUB_OUTPUT"
          elif echo "$PZ_BODY" | grep -q '^\[\]$'; then
            echo "puzzles_status=ok" >> "$GITHUB_OUTPUT"
            echo "::notice::Puzzles endpoint returned empty array"
          else
            echo "puzzles_status=failed" >> "$GITHUB_OUTPUT"
            echo "puzzles_error=Unexpected puzzles response format" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine overall result
        id: result
        run: |
          HEALTH="${{ steps.health.outputs.health_status }}"
          PUZZLES="${{ steps.puzzles.outputs.puzzles_status }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

          if [ "$HEALTH" = "healthy" ] && [ "$PUZZLES" = "ok" ]; then
            echo "status=healthy" >> "$GITHUB_OUTPUT"
          elif [ "$HEALTH" = "degraded" ]; then
            echo "status=degraded" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

          echo "Overall: health=$HEALTH puzzles=$PUZZLES"

      - name: Handle failure — create or update issue
        if: steps.result.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const healthStatus = '${{ steps.health.outputs.health_status }}';
            const httpStatus = '${{ steps.health.outputs.http_status }}';
            const responseTime = '${{ steps.health.outputs.response_time }}';
            const responseBody = `${{ steps.health.outputs.response_body }}`;
            const healthError = '${{ steps.health.outputs.error }}';
            const puzzlesStatus = '${{ steps.puzzles.outputs.puzzles_status }}';
            const puzzlesError = '${{ steps.puzzles.outputs.puzzles_error }}';
            const timestamp = '${{ steps.result.outputs.timestamp }}';

            let errorSummary = healthError || `Health: ${healthStatus}, Puzzles: ${puzzlesStatus}`;
            const title = `[Deep] Service health issue: ${errorSummary}`.slice(0, 120);

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'service-health',
              state: 'open',
              per_page: 10,
            });

            const body = [
              `## Deep Health Check Alert`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Detected at** | ${timestamp} |`,
              `| **Check type** | Deep HTTP (container was woken) |`,
              `| **Health endpoint** | ${healthStatus} |`,
              `| **HTTP status** | ${httpStatus} |`,
              `| **Response time** | ${responseTime}ms |`,
              `| **Puzzles endpoint** | ${puzzlesStatus || 'skipped'} |`,
              `| **Environment** | production |`,
              `| **Workflow run** | [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              ``,
              `### Health endpoint response`,
              '```json',
              responseBody || 'No response body',
              '```',
              ``,
              healthError ? `### Error\n${healthError}` : '',
              puzzlesError ? `### Puzzles error\n${puzzlesError}` : '',
            ].filter(Boolean).join('\n');

            const matching = existingIssues.filter(i => i.title.startsWith('[Deep]'));

            if (matching.length > 0) {
              const issue = matching[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `### Deep check still failing\n\n**Time:** ${timestamp}\n**Health:** ${healthStatus} (HTTP ${httpStatus}, ${responseTime}ms)\n**Puzzles:** ${puzzlesStatus || 'skipped'}\n\n${healthError || ''}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['service-health'],
                body,
              });
            }

      - name: Handle degraded — warn but don't fail
        if: steps.result.outputs.status == 'degraded'
        run: |
          echo "::warning::Service is degraded — response time ${{ steps.health.outputs.response_time }}ms"
          echo "⚠️ Production health check: DEGRADED"

      - name: Log success
        if: steps.result.outputs.status == 'healthy'
        run: echo "✅ Deep health check passed (${{ steps.health.outputs.response_time }}ms)"
