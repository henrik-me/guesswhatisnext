name: Deploy to Staging

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch: {}

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/henrik-me/guesswhatisnext

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_NAME }}:latest

  smoke-test:
    name: Ephemeral Smoke Test
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    services:
      app:
        image: ghcr.io/henrik-me/guesswhatisnext:${{ needs.build-and-push.outputs.image-tag }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        ports:
          - 3000:3000
        env:
          NODE_ENV: staging
          PORT: 3000
          JWT_SECRET: ephemeral-smoke-test-secret
          SYSTEM_API_KEY: ephemeral-smoke-test-key
        options: >-
          --health-cmd "node -e \"const http = require('http'); const req = http.get('http://localhost:3000/api/health', {headers: {'X-API-Key': 'ephemeral-smoke-test-key'}}, (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1));\""
          --health-interval 5s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 15s
    steps:
      - name: Initialize database
        run: |
          # NODE_ENV=staging blocks DB access until init-db is called
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "http://localhost:3000/api/admin/init-db" \
            -H "X-API-Key: ephemeral-smoke-test-key")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Init-db status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Database initialization failed with status $HTTP_STATUS"
            echo "$RESPONSE" | sed '$d'
            exit 1
          fi

      - name: Health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "X-API-Key: ephemeral-smoke-test-key" \
            "http://localhost:3000/api/health")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Register test user
        run: |
          TIMESTAMP=$(date +%s)
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "http://localhost:3000/api/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"smoketest_${TIMESTAMP}\", \"password\": \"SmokeTest123!\"}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Register status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::User registration failed with status $HTTP_STATUS"
            echo "$BODY"
            exit 1
          fi
          TOKEN=$(echo "$BODY" | jq -r '.token')
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Submit test score
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "http://localhost:3000/api/scores" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            -d '{"mode": "freeplay", "score": 100, "correctCount": 5, "totalRounds": 5, "bestStreak": 5}')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Score submit status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Score submission failed with status $HTTP_STATUS"
            echo "$RESPONSE" | sed '$d'
            exit 1
          fi

      - name: Fetch puzzles
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            "http://localhost:3000/api/puzzles")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Puzzles endpoint status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Puzzles endpoint failed with status $HTTP_STATUS"
            exit 1
          fi

  update-staging-branch:
    name: Fast-Forward release/staging
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward release/staging to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create release/staging if it doesn't exist
          if ! git ls-remote --exit-code origin refs/heads/release/staging > /dev/null 2>&1; then
            echo "Creating release/staging branch"
            git checkout -b release/staging
            git push origin release/staging
          else
            echo "Fast-forwarding release/staging to main"
            git fetch origin release/staging
            git checkout release/staging
            git merge --ff-only origin/main
            git push origin release/staging
          fi

  deploy-azure-staging:
    name: Deploy to Azure Staging
    needs: [build-and-push, update-staging-branch]
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure GHCR registry credentials
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp registry set \
              --name gwn-staging \
              --resource-group gwn-rg \
              --server ghcr.io \
              --username ${{ vars.GHCR_USERNAME }} \
              --password ${{ secrets.GHCR_PAT }}

      - name: Ensure multiple revision mode
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp revision set-mode \
              --name gwn-staging \
              --resource-group gwn-rg \
              --mode multiple

      - name: Deploy new revision (0% traffic)
        id: deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Find the revision currently receiving traffic (not just the latest-created one)
            CURRENT_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
              --query "properties.configuration.ingress.traffic[?weight > \`0\`] | [0].revisionName" -o tsv 2>/dev/null || echo "")
            if [ -z "$CURRENT_REV" ] || [ "$CURRENT_REV" = "None" ]; then
              CURRENT_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
                --query "properties.latestRevisionName" -o tsv 2>/dev/null || echo "")
            fi
            echo "current-revision=$CURRENT_REV" >> "$GITHUB_OUTPUT"
            echo "Current revision (rollback target): $CURRENT_REV"

            # Get current revision's FQDN for drain call
            if [ -n "$CURRENT_REV" ]; then
              CURRENT_FQDN=$(az containerapp revision show --name gwn-staging --resource-group gwn-rg \
                --revision "$CURRENT_REV" --query "properties.fqdn" -o tsv 2>/dev/null || echo "")
              echo "current-fqdn=$CURRENT_FQDN" >> "$GITHUB_OUTPUT"
              echo "Current revision FQDN: $CURRENT_FQDN"
            fi

            # Deploy with YAML template (preserves volume mounts)
            SUFFIX="deploy-$(date +%s)"
            TEMPLATE_FILE=$(mktemp)
            trap "rm -f $TEMPLATE_FILE" EXIT
            cat > "$TEMPLATE_FILE" <<YAMLEOF
            properties:
              template:
                revisionSuffix: $SUFFIX
                volumes:
                  - name: data-volume
                    storageName: gwn-storage-staging
                    storageType: AzureFile
                containers:
                  - name: gwn-staging
                    image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                    env:
                      - name: NODE_ENV
                        value: staging
                      - name: PORT
                        value: "3000"
                      - name: JWT_SECRET
                        value: "${JWT_SECRET}"
                      - name: SYSTEM_API_KEY
                        value: "${SYSTEM_API_KEY}"
                    resources:
                      cpu: 0.5
                      memory: 1Gi
                    volumeMounts:
                      - volumeName: data-volume
                        mountPath: /app/data
            YAMLEOF
            az containerapp update \
              --name gwn-staging \
              --resource-group gwn-rg \
              --min-replicas 1 \
              --yaml "$TEMPLATE_FILE"

            # Get new revision name and FQDN
            NEW_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
              --query "properties.latestRevisionName" -o tsv)
            echo "new-revision=$NEW_REV" >> "$GITHUB_OUTPUT"

            NEW_FQDN=$(az containerapp revision show --name gwn-staging --resource-group gwn-rg \
              --revision "$NEW_REV" --query "properties.fqdn" -o tsv)
            echo "new-fqdn=$NEW_FQDN" >> "$GITHUB_OUTPUT"
            echo "New revision: $NEW_REV (FQDN: $NEW_FQDN)"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}

      - name: Wait for new revision to be ready (healthz)
        run: |
          NEW_FQDN="${{ steps.deploy.outputs.new-fqdn }}"
          echo "Waiting for new revision at https://$NEW_FQDN/healthz ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 10 \
              "https://$NEW_FQDN/healthz" || echo "000")
            echo "  Attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "New revision is ready!"
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::New revision failed to become ready"
            exit 1
          fi

      - name: Switch traffic to new revision
        uses: azure/cli@v2
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            echo "Switching 100% traffic to $NEW_REV"
            az containerapp ingress traffic set \
              --name gwn-staging --resource-group gwn-rg \
              --revision-weight "$NEW_REV=100"

      - name: Drain old revision DB connection
        if: steps.deploy.outputs.current-fqdn != ''
        run: |
          CURRENT_FQDN="${{ steps.deploy.outputs.current-fqdn }}"
          echo "Draining old revision at https://$CURRENT_FQDN ..."
          for i in 1 2 3; do
            RESPONSE=$(curl -sk -w '\n%{http_code}' --max-time 45 \
              -X POST "https://$CURRENT_FQDN/api/admin/drain" \
              -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" || echo -e "\n000")
            HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
            echo "Drain attempt $i: HTTP $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Old revision drained successfully"
              break
            fi
            sleep 5
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Drain failed (HTTP $HTTP_STATUS) — proceeding anyway (old revision may be already stopped)"
          fi
          echo "Waiting for SMB lock release..."
          sleep 10

      - name: Initialize DB on new revision
        run: |
          NEW_FQDN="${{ steps.deploy.outputs.new-fqdn }}"
          echo "Initializing DB on new revision at https://$NEW_FQDN ..."
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -sk -w '\n%{http_code}' --max-time 30 \
              -X POST "https://$NEW_FQDN/api/admin/init-db" \
              -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" || echo -e "\n000")
            HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
            echo "Init attempt $i: $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "DB initialized successfully!"
              break
            fi
            sleep 10
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Failed to initialize DB on new revision"
            exit 1
          fi

      - name: Verify staging deployment
        run: |
          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
              -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" \
              "${{ vars.STAGING_URL }}/api/health" || true)
            echo "Health check attempt $i: $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Staging deployment healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Staging health check failed after 5 attempts"
          exit 1

      - name: Deactivate old revisions
        if: success()
        uses: azure/cli@v2
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            echo "Deactivating all revisions except $NEW_REV ..."
            az containerapp revision list --name gwn-staging --resource-group gwn-rg \
              --query "[?properties.active && name != '$NEW_REV'].name" -o tsv | while read -r rev; do
              echo "Deactivating: $rev"
              az containerapp revision deactivate --name gwn-staging --resource-group gwn-rg \
                --revision "$rev" || true
            done

      - name: Rollback on failure
        if: failure() && steps.deploy.outputs.current-revision != ''
        uses: azure/cli@v2
        with:
          inlineScript: |
            CURRENT_REV="${{ steps.deploy.outputs.current-revision }}"
            echo "::warning::Rolling back to $CURRENT_REV"
            # Reactivate old revision
            az containerapp revision activate --name gwn-staging --resource-group gwn-rg \
              --revision "$CURRENT_REV" || true
            # Switch traffic back
            az containerapp ingress traffic set \
              --name gwn-staging --resource-group gwn-rg \
              --revision-weight "$CURRENT_REV=100" || true
            # Try to re-init DB on old revision
            CURRENT_FQDN="${{ steps.deploy.outputs.current-fqdn }}"
            if [ -n "$CURRENT_FQDN" ]; then
              curl -sk --max-time 30 -X POST \
                "https://$CURRENT_FQDN/api/admin/init-db" \
                -H "X-API-Key: ${{ secrets.SYSTEM_API_KEY }}" || true
            fi

      - name: Tag deployment
        uses: azure/cli@v2
        with:
          inlineScript: |
            REVISION=$(az containerapp show --name gwn-staging --resource-group gwn-rg --query "properties.latestRevisionName" -o tsv)
            echo "Tagging commit as: $REVISION"
            echo "REVISION=$REVISION" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Push deployment tag
        run: |
          git tag "$REVISION" "${{ github.sha }}"
          git push origin "$REVISION"
          echo "✅ Tagged ${{ github.sha }} as $REVISION"
