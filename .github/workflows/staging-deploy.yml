name: Deploy to Staging

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'public/**'
      - 'scripts/build-sw.js'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose*.yml'
      - '.github/workflows/staging-deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: staging-deploy
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/henrik-me/guesswhatisnext

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    if: github.event_name == 'workflow_dispatch' || vars.STAGING_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_NAME }}:latest

  smoke-test:
    name: Ephemeral Smoke Test
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    services:
      mssql:
        image: ghcr.io/henrik-me/mssql-server:2022-CU17-ubuntu-22.04
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "GwnTest1!"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'GwnTest1!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

      otel-collector:
        image: otel/opentelemetry-collector:0.100.0

      app:
        image: ghcr.io/henrik-me/guesswhatisnext:${{ needs.build-and-push.outputs.image-tag }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        ports:
          - 3000:3000
        env:
          NODE_ENV: staging
          PORT: 3000
          JWT_SECRET: ephemeral-smoke-test-secret
          SYSTEM_API_KEY: ephemeral-smoke-test-key
          CANONICAL_HOST: localhost:3000
          DATABASE_URL: "Server=mssql,1433;Database=gwn;User Id=sa;Password=GwnTest1!;Encrypt=false;TrustServerCertificate=true"
          OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
          FEATURE_FLAG_ALLOW_OVERRIDE: "true"
          TRUST_PROXY: "2"
        options: >-
          --health-cmd "node -e \"const http = require('http'); const req = http.get('http://localhost:3000/api/health', {headers: {'X-API-Key': 'ephemeral-smoke-test-key', 'X-Forwarded-Proto': 'https'}}, (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1));\""
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12
          --health-start-period 30s
    steps:
      - name: Create MSSQL database
        run: |
          echo "Creating gwn database in MSSQL..."
          docker exec ${{ job.services.mssql.id }} /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'GwnTest1!' -C \
            -Q "IF DB_ID('gwn') IS NULL CREATE DATABASE [gwn]"
          echo "Database gwn created (or already exists)."

      - name: Trigger app database initialization
        run: |
          echo "Triggering app DB initialization via /api/admin/init-db..."
          # Drain first to cancel any background self-init retry that may
          # still be scheduled, preventing concurrent initializeDatabase() calls.
          # Retry until the app is reachable and acknowledges the drain request.
          for i in $(seq 1 10); do
            set +e
            DRAIN_HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 35 \
              -X POST "http://localhost:3000/api/admin/drain" \
              -H "X-API-Key: ephemeral-smoke-test-key" \
              -H "X-Forwarded-Proto: https")
            DRAIN_CURL_EXIT=$?
            set -e
            echo "Drain attempt $i: status=$DRAIN_HTTP_STATUS (curl exit=$DRAIN_CURL_EXIT)"
            if [ "$DRAIN_HTTP_STATUS" = "200" ]; then
              echo "Background self-init drained successfully."
              break
            fi
            if [ "$DRAIN_CURL_EXIT" -ne 7 ]; then
              echo "::error::Drain failed with non-connection error (curl exit=$DRAIN_CURL_EXIT, HTTP=$DRAIN_HTTP_STATUS)"
              exit 1
            fi
            sleep 3
          done
          if [ "$DRAIN_HTTP_STATUS" != "200" ]; then
            echo "::error::Failed to drain background self-init after 10 attempts"
            exit 1
          fi
          sleep 2

          # Now trigger fresh initialization against the newly created DB.
          # Only retry on connection failures (exit 7) to prevent concurrent init.
          for i in $(seq 1 10); do
            set +e
            HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 180 \
              -X POST "http://localhost:3000/api/admin/init-db" \
              -H "X-API-Key: ephemeral-smoke-test-key" \
              -H "X-Forwarded-Proto: https")
            CURL_EXIT=$?
            set -e
            echo "Init-db attempt $i: status=$HTTP_STATUS (curl exit=$CURL_EXIT)"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Database initialization triggered successfully."
              break
            fi
            if [ "$CURL_EXIT" -ne 7 ]; then
              echo "::error::Init-db failed with non-connection error (curl exit=$CURL_EXIT, HTTP=$HTTP_STATUS)"
              exit 1
            fi
            sleep 3
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Failed to trigger DB initialization after 10 attempts"
            exit 1
          fi

      - name: Wait for database readiness
        run: |
          echo "Waiting for database to report healthy..."
          for i in $(seq 1 45); do
            DB_STATUS="unreachable"
            if RESPONSE=$(curl -sf --connect-timeout 5 --max-time 10 \
              -H "X-API-Key: ephemeral-smoke-test-key" \
              -H "X-Forwarded-Proto: https" \
              "http://localhost:3000/api/health"); then
              DB_STATUS=$(printf '%s' "$RESPONSE" | jq -r '.checks.database.status' 2>/dev/null || echo "unreachable")
            fi
            echo "Attempt $i/45: database status = $DB_STATUS"
            if [ "$DB_STATUS" = "ok" ]; then
              echo "Database ready!"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Database not ready after ~90 seconds"
          exit 1

      - name: Health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 \
            -H "X-API-Key: ephemeral-smoke-test-key" \
            -H "X-Forwarded-Proto: https" \
            "http://localhost:3000/api/health")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Register test user
        run: |
          TIMESTAMP=$(date +%s)
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "http://localhost:3000/api/auth/register" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-Proto: https" \
            -d "{\"username\": \"smoketest_${TIMESTAMP}\", \"password\": \"SmokeTest123!\"}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Register status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::User registration failed with status $HTTP_STATUS"
            echo "$BODY"
            exit 1
          fi
          TOKEN=$(echo "$BODY" | jq -r '.token')
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Submit test score
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "http://localhost:3000/api/scores" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-Proto: https" \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            -d '{"mode": "freeplay", "score": 100, "correctCount": 5, "totalRounds": 5, "bestStreak": 5}')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Score submit status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Score submission failed with status $HTTP_STATUS"
            echo "$RESPONSE" | sed '$d'
            exit 1
          fi

      - name: Fetch puzzles
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -H "X-Forwarded-Proto: https" \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            "http://localhost:3000/api/puzzles")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Puzzles endpoint status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Puzzles endpoint failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Telemetry endpoint (valid error)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 \
            -X POST "http://localhost:3000/api/telemetry/errors" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-Proto: https" \
            -d '{"message": "smoke-test-error", "type": "SmokeTestError"}')
          echo "Telemetry valid payload status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "::error::Telemetry endpoint failed (expected 204, got $HTTP_STATUS)"
            exit 1
          fi

      - name: Telemetry endpoint (invalid payload)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 \
            -X POST "http://localhost:3000/api/telemetry/errors" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-Proto: https" \
            -d '{"type": "MissingMessage"}')
          echo "Telemetry invalid payload status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "400" ]; then
            echo "::error::Telemetry validation failed (expected 400, got $HTTP_STATUS)"
            exit 1
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      # Lockfile generated on Windows lacks Linux-specific optional deps
      # (rolldown native bindings). Fresh install resolves correctly.
      - run: rm -f package-lock.json && npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against ephemeral container
        timeout-minutes: 15
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "Running Playwright tests (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            set +e
            OUTPUT=$(npx playwright test 2>&1)
            STATUS=$?
            set -e
            echo "$OUTPUT"

            if [ "$STATUS" -eq 0 ]; then
              echo "Playwright tests succeeded."
              exit 0
            fi

            # Retry on rate limiting or browser crashes (Chromium SEGFAULT)
            if echo "$OUTPUT" | grep -qiE 'status[: ]+429|Error.*429|HTTP.*429|too many requests|browser.newContext.*closed|Received signal 11'; then
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                echo "Detected transient failure. Waiting 15s before retry..."
                sleep 15
                ATTEMPT=$((ATTEMPT + 1))
                continue
              fi
              echo "Transient failures persisted after $MAX_ATTEMPTS attempts. Failing."
            fi

            echo "Playwright tests failed with status $STATUS. Not retrying."
            exit "$STATUS"
          done
        env:
          BASE_URL: http://localhost:3000
          SYSTEM_API_KEY: ephemeral-smoke-test-key

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: staging-e2e-results
          path: test-results/
          retention-days: 7

  update-staging-branch:
    name: Fast-Forward release/staging
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Fast-forward release/staging to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create release/staging if it doesn't exist
          if ! git ls-remote --exit-code origin refs/heads/release/staging > /dev/null 2>&1; then
            echo "Creating release/staging branch"
            git checkout -b release/staging
            git push origin release/staging
          else
            echo "Fast-forwarding release/staging to main"
            git fetch origin release/staging
            git checkout release/staging
            git merge --ff-only origin/main
            git push origin release/staging
          fi

  deploy-azure-staging:
    name: Deploy to Azure Staging
    needs: [build-and-push, update-staging-branch]
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    steps:
      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure GHCR registry credentials
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            az containerapp registry set \
              --name gwn-staging \
              --resource-group gwn-rg \
              --server ghcr.io \
              --username ${{ vars.GHCR_USERNAME }} \
              --password ${{ secrets.GHCR_PAT }}

      - name: Ensure multiple revision mode
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            az containerapp revision set-mode \
              --name gwn-staging \
              --resource-group gwn-rg \
              --mode multiple

      - name: Deploy new revision (0% traffic)
        id: deploy
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            # Derive CANONICAL_HOST from STAGING_URL if not explicitly set
            if [ -z "$CANONICAL_HOST" ] && [ -n "$STAGING_URL" ]; then
              CANONICAL_HOST=$(echo "$STAGING_URL" | sed 's|^https\?://||' | sed 's|[/?#].*||' | sed 's|/$||')
              export CANONICAL_HOST
            fi
            if [ -z "$CANONICAL_HOST" ]; then
              echo "::error::CANONICAL_HOST not set. Configure vars.STAGING_URL or vars.CANONICAL_HOST in repository settings."
              exit 1
            fi
            echo "Using CANONICAL_HOST=$CANONICAL_HOST"

            # Check if container app is stopped and start it if needed
            APP_STATE=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
              --query "properties.runningStatus" -o tsv 2>/dev/null || echo "Unknown")
            echo "Container app state: $APP_STATE"
            if [ "$APP_STATE" != "Running" ]; then
              echo "Container app is not running — starting via REST API..."
              SUB_ID=$(az account show --query "id" -o tsv)
              az rest --method POST \
                --url "/subscriptions/$SUB_ID/resourceGroups/gwn-rg/providers/Microsoft.App/containerApps/gwn-staging/start?api-version=2024-03-01"
              echo "Waiting for container app to start..."
              for i in $(seq 1 12); do
                APP_STATE=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
                  --query "properties.runningStatus" -o tsv 2>/dev/null || echo "Unknown")
                echo "Start attempt $i/12: state=$APP_STATE"
                if [ "$APP_STATE" = "Running" ]; then
                  break
                fi
                sleep 10
              done
              if [ "$APP_STATE" != "Running" ]; then
                echo "::error::Container app failed to start after 120s (state: $APP_STATE)"
                exit 1
              fi
            fi

            # Find the revision currently receiving traffic (not just the latest-created one)
            CURRENT_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
              --query "properties.configuration.ingress.traffic[?weight > \`0\`] | [0].revisionName" -o tsv 2>/dev/null || echo "")
            if [ -z "$CURRENT_REV" ] || [ "$CURRENT_REV" = "None" ]; then
              CURRENT_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
                --query "properties.latestRevisionName" -o tsv 2>/dev/null || echo "")
            fi
            echo "current-revision=$CURRENT_REV" >> "$GITHUB_OUTPUT"
            echo "Current revision (rollback target): $CURRENT_REV"

            # Deploy with YAML template
            SUFFIX="deploy-$(date +%s)"
            TEMPLATE_FILE=$(mktemp)
            trap "rm -f $TEMPLATE_FILE" EXIT
            cat > "$TEMPLATE_FILE" <<YAMLEOF
            properties:
              template:
                revisionSuffix: $SUFFIX
                scale:
                  minReplicas: 1
                  maxReplicas: 1
                containers:
                  - name: gwn-staging
                    image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                    env:
                      - name: NODE_ENV
                        value: staging
                      - name: PORT
                        value: "3000"
                      - name: JWT_SECRET
                        value: "${JWT_SECRET}"
                      - name: SYSTEM_API_KEY
                        value: "${SYSTEM_API_KEY}"
                      - name: CANONICAL_HOST
                        value: "${CANONICAL_HOST}"
                      - name: GWN_DB_PATH
                        value: /tmp/game.db
                      - name: APPLICATIONINSIGHTS_CONNECTION_STRING
                        secretRef: appinsights-connection-string
                    resources:
                      cpu: 0.5
                      memory: 1Gi
            YAMLEOF
            az containerapp update \
              --name gwn-staging \
              --resource-group gwn-rg \
              --yaml "$TEMPLATE_FILE"

            # Get new revision name
            NEW_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
              --query "properties.latestRevisionName" -o tsv)
            if [ -z "$NEW_REV" ] || [ "$NEW_REV" = "None" ]; then
              echo "::error::Failed to get new revision name"
              exit 1
            fi
            echo "new-revision=$NEW_REV" >> "$GITHUB_OUTPUT"

            echo "New revision: $NEW_REV"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          CANONICAL_HOST: ${{ vars.CANONICAL_HOST }}
          STAGING_URL: ${{ vars.STAGING_URL }}

      - name: Switch traffic to new revision
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            echo "Switching 100% traffic to $NEW_REV"
            az containerapp ingress traffic set \
              --name gwn-staging --resource-group gwn-rg \
              --revision-weight "$NEW_REV=100"

      - name: Deactivate old revisions
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            if [ -z "$NEW_REV" ] || [ "$NEW_REV" = "None" ]; then
              echo "::error::NEW_REV is invalid — skipping deactivation to avoid taking app offline"
              exit 1
            fi
            echo "Deactivating all revisions except $NEW_REV..."
            az containerapp revision list --name gwn-staging --resource-group gwn-rg \
              --query "[?properties.active && name != '$NEW_REV'].name" -o tsv | while read -r rev; do
              echo "Deactivating: $rev"
              az containerapp revision deactivate --name gwn-staging --resource-group gwn-rg \
                --revision "$rev" || true
            done
            sleep 15

      - name: Verify staging deployment
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            echo "Waiting for revision $NEW_REV to reach Running state..."
            for i in $(seq 1 10); do
              STATE=$(az containerapp revision show \
                --name gwn-staging --resource-group gwn-rg \
                --revision "$NEW_REV" \
                --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "Attempt $i: state=$STATE"
              if echo "$STATE" | grep -qiE "^Running"; then
                break
              fi
              sleep 10
            done
            if ! echo "$STATE" | grep -qiE "^Running"; then
              echo "::error::Revision $NEW_REV not Running after 100s (state: $STATE)"
              exit 1
            fi
            echo "Revision is running — verifying DB initialization via application logs..."
            # Self-init budget: 2s initial delay + up to 30 × (2s busy_timeout + 5s
            # interval) ≈ 212s, plus Azure log propagation latency (~30s).
            # 60 × 5s = 300s gives comfortable slack beyond that ceiling.
            DB_CONFIRMED=0
            for i in $(seq 1 60); do
              if ! LOGS=$(az containerapp logs show \
                --name gwn-staging --resource-group gwn-rg \
                --revision "$NEW_REV" \
                --type console --tail 100 2>&1); then
                echo "Log query failed, retrying..."
                sleep 5
                continue
              fi
              if echo "$LOGS" | grep -qE "Database (self-initialized|initialized)"; then
                echo "✅ Staging deployment verified — DB initialization confirmed in logs"
                DB_CONFIRMED=1
                break
              fi
              echo "DB init not confirmed yet (attempt $i/60)..."
              sleep 5
            done
            if [ "$DB_CONFIRMED" -ne 1 ]; then
              echo "::error::DB initialization not confirmed in application logs after 300s"
              exit 1
            fi

      - name: Rollback on failure
        if: failure() && steps.deploy.outputs.current-revision != ''
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            CURRENT_REV="${{ steps.deploy.outputs.current-revision }}"
            if [ -z "$CURRENT_REV" ] || [ "$CURRENT_REV" = "None" ]; then
              echo "::error::CURRENT_REV is invalid ('$CURRENT_REV') — cannot rollback safely"
              exit 1
            fi
            echo "::warning::Rolling back to $CURRENT_REV"
            # Reactivate old revision first so there's always at least one
            # active revision. Pre-self-init revisions will need manual
            # POST /api/admin/init-db to resume API service (one-time transition risk).
            az containerapp revision activate --name gwn-staging --resource-group gwn-rg \
              --revision "$CURRENT_REV" || true
            # Wait for old revision to reach Running state before proceeding
            ROLLBACK_READY=0
            for attempt in 1 2 3 4 5; do
              STATE=$(az containerapp revision show \
                --name gwn-staging --resource-group gwn-rg \
                --revision "$CURRENT_REV" \
                --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "::notice::Rollback target $CURRENT_REV state=$STATE (attempt $attempt/5)"
              if echo "$STATE" | grep -qiE "^Running"; then
                ROLLBACK_READY=1
                break
              fi
              sleep 10
            done
            if [ "$ROLLBACK_READY" -ne 1 ]; then
              echo "::warning::Rollback target $CURRENT_REV not Running yet — proceeding anyway"
            fi
            # --- Step 1: Switch traffic away from the failed revision first ---
            # This must happen BEFORE deactivating the new revision, otherwise
            # ingress would briefly point at an inactive revision (downtime).
            TRAFFIC_SET=0
            for attempt in 1 2 3; do
              if az containerapp ingress traffic set \
                --name gwn-staging --resource-group gwn-rg \
                --revision-weight "$CURRENT_REV=100"; then
                TRAFFIC_SET=1
                break
              fi
              echo "::warning::Failed to set traffic to $CURRENT_REV (attempt $attempt/3); retrying in 10s..."
              sleep 10
            done
            if [ "$TRAFFIC_SET" -ne 1 ]; then
              echo "::error::Failed to set traffic to $CURRENT_REV after 3 attempts"
              exit 1
            fi
            # Allow Azure ingress routing to propagate before deactivating
            sleep 10
            # --- Step 2: Deactivate the failed new revision ---
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            if [ -n "$NEW_REV" ] && [ "$NEW_REV" != "None" ] && [ "$NEW_REV" != "$CURRENT_REV" ]; then
              az containerapp revision deactivate --name gwn-staging --resource-group gwn-rg \
                --revision "$NEW_REV" || true
            fi

      - name: Tag deployment
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            REVISION=$(az containerapp show --name gwn-staging --resource-group gwn-rg --query "properties.latestRevisionName" -o tsv)
            echo "Tagging commit as: $REVISION"
            echo "REVISION=$REVISION" >> "$GITHUB_ENV"

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Push deployment tag
        run: |
          git tag "$REVISION" "${{ github.sha }}"
          git push origin "$REVISION"
          echo "✅ Tagged ${{ github.sha }} as $REVISION"
