name: Deploy to Staging

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'public/**'
      - 'scripts/build-sw.js'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose*.yml'
      - '.github/workflows/staging-deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: staging-deploy
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/henrik-me/guesswhatisnext

permissions:
  contents: write
  packages: write
  actions: read  # CS41-7: gh run list (compute-ingest-delta.js) needs Actions read

jobs:
  build-and-push:
    name: Build & Push Docker Image
    if: github.event_name == 'workflow_dispatch' || vars.STAGING_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_NAME }}:latest

  smoke-test:
    name: Ephemeral Smoke Test
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    services:
      mssql:
        image: ghcr.io/henrik-me/mssql-server:2022-CU17-ubuntu-22.04
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "GwnTest1!"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'GwnTest1!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

      otel-collector:
        image: otel/opentelemetry-collector:0.100.0

      app:
        image: ghcr.io/henrik-me/guesswhatisnext:${{ needs.build-and-push.outputs.image-tag }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        ports:
          - 3000:3000
        env:
          NODE_ENV: staging
          PORT: 3000
          JWT_SECRET: ephemeral-smoke-test-secret
          SYSTEM_API_KEY: ephemeral-smoke-test-key
          CANONICAL_HOST: localhost:3000
          DATABASE_URL: "Server=mssql,1433;Database=gwn;User Id=sa;Password=GwnTest1!;Encrypt=false;TrustServerCertificate=true"
          OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
          FEATURE_FLAG_ALLOW_OVERRIDE: "true"
          TRUST_PROXY: "2"
        options: >-
          --health-cmd "node -e \"const http = require('http'); const req = http.get('http://localhost:3000/api/health', {headers: {'X-API-Key': 'ephemeral-smoke-test-key', 'X-Forwarded-Proto': 'https'}}, (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1));\""
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12
          --health-start-period 30s
    steps:
      - name: Create MSSQL database
        run: |
          echo "Creating gwn database in MSSQL..."
          docker exec ${{ job.services.mssql.id }} /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'GwnTest1!' -C \
            -Q "IF DB_ID('gwn') IS NULL CREATE DATABASE [gwn]"
          echo "Database gwn created (or already exists)."

      - name: Trigger app database initialization
        run: |
          echo "Triggering app DB initialization via /api/admin/init-db..."
          # Drain first to cancel any background self-init retry that may
          # still be scheduled, preventing concurrent initializeDatabase() calls.
          # Retry until the app is reachable and acknowledges the drain request.
          for i in $(seq 1 10); do
            set +e
            DRAIN_HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 35 \
              -X POST "http://localhost:3000/api/admin/drain" \
              -H "X-API-Key: ephemeral-smoke-test-key" \
              -H "X-Forwarded-Proto: https")
            DRAIN_CURL_EXIT=$?
            set -e
            echo "Drain attempt $i: status=$DRAIN_HTTP_STATUS (curl exit=$DRAIN_CURL_EXIT)"
            if [ "$DRAIN_HTTP_STATUS" = "200" ]; then
              echo "Background self-init drained successfully."
              break
            fi
            if [ "$DRAIN_CURL_EXIT" -ne 7 ]; then
              echo "::error::Drain failed with non-connection error (curl exit=$DRAIN_CURL_EXIT, HTTP=$DRAIN_HTTP_STATUS)"
              exit 1
            fi
            sleep 3
          done
          if [ "$DRAIN_HTTP_STATUS" != "200" ]; then
            echo "::error::Failed to drain background self-init after 10 attempts"
            exit 1
          fi
          sleep 2

          # Now trigger fresh initialization against the newly created DB.
          # Only retry on connection failures (exit 7) to prevent concurrent init.
          for i in $(seq 1 10); do
            set +e
            HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 180 \
              -X POST "http://localhost:3000/api/admin/init-db" \
              -H "X-API-Key: ephemeral-smoke-test-key" \
              -H "X-Forwarded-Proto: https")
            CURL_EXIT=$?
            set -e
            echo "Init-db attempt $i: status=$HTTP_STATUS (curl exit=$CURL_EXIT)"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Database initialization triggered successfully."
              break
            fi
            if [ "$CURL_EXIT" -ne 7 ]; then
              echo "::error::Init-db failed with non-connection error (curl exit=$CURL_EXIT, HTTP=$HTTP_STATUS)"
              exit 1
            fi
            sleep 3
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Failed to trigger DB initialization after 10 attempts"
            exit 1
          fi

      - name: Wait for database readiness
        run: |
          echo "Waiting for database to report healthy..."
          for i in $(seq 1 45); do
            DB_STATUS="unreachable"
            if RESPONSE=$(curl -sf --connect-timeout 5 --max-time 10 \
              -H "X-API-Key: ephemeral-smoke-test-key" \
              -H "X-Forwarded-Proto: https" \
              "http://localhost:3000/api/health"); then
              DB_STATUS=$(printf '%s' "$RESPONSE" | jq -r '.checks.database.status' 2>/dev/null || echo "unreachable")
            fi
            echo "Attempt $i/45: database status = $DB_STATUS"
            if [ "$DB_STATUS" = "ok" ]; then
              echo "Database ready!"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Database not ready after ~90 seconds"
          exit 1

      - name: Health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 \
            -H "X-API-Key: ephemeral-smoke-test-key" \
            -H "X-Forwarded-Proto: https" \
            "http://localhost:3000/api/health")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Register test user
        run: |
          TIMESTAMP=$(date +%s)
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "http://localhost:3000/api/auth/register" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-Proto: https" \
            -d "{\"username\": \"smoketest_${TIMESTAMP}\", \"password\": \"SmokeTest123!\"}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Register status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::User registration failed with status $HTTP_STATUS"
            echo "$BODY"
            exit 1
          fi
          TOKEN=$(echo "$BODY" | jq -r '.token')
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Submit test score
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -X POST "http://localhost:3000/api/scores" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-Proto: https" \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            -d '{"mode": "freeplay", "score": 100, "correctCount": 5, "totalRounds": 5, "bestStreak": 5}')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Score submit status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "::error::Score submission failed with status $HTTP_STATUS"
            echo "$RESPONSE" | sed '$d'
            exit 1
          fi

      - name: Fetch puzzles
        run: |
          RESPONSE=$(curl -s -w '\n%{http_code}' \
            -H "X-Forwarded-Proto: https" \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            "http://localhost:3000/api/puzzles")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Puzzles endpoint status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Puzzles endpoint failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Telemetry endpoint (valid error)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 \
            -X POST "http://localhost:3000/api/telemetry/errors" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-Proto: https" \
            -d '{"message": "smoke-test-error", "type": "SmokeTestError"}')
          echo "Telemetry valid payload status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ]; then
            echo "::error::Telemetry endpoint failed (expected 204, got $HTTP_STATUS)"
            exit 1
          fi

      - name: Telemetry endpoint (invalid payload)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 \
            -X POST "http://localhost:3000/api/telemetry/errors" \
            -H "Content-Type: application/json" \
            -H "X-Forwarded-Proto: https" \
            -d '{"type": "MissingMessage"}')
          echo "Telemetry invalid payload status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "400" ]; then
            echo "::error::Telemetry validation failed (expected 400, got $HTTP_STATUS)"
            exit 1
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      # Lockfile generated on Windows lacks Linux-specific optional deps
      # (rolldown native bindings). Fresh install resolves correctly.
      - run: rm -f package-lock.json && npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against ephemeral container
        timeout-minutes: 15
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "Running Playwright tests (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            set +e
            OUTPUT=$(npx playwright test 2>&1)
            STATUS=$?
            set -e
            echo "$OUTPUT"

            if [ "$STATUS" -eq 0 ]; then
              echo "Playwright tests succeeded."
              exit 0
            fi

            # Retry on rate limiting or browser crashes (Chromium SEGFAULT)
            if echo "$OUTPUT" | grep -qiE 'status[: ]+429|Error.*429|HTTP.*429|too many requests|browser.newContext.*closed|Received signal 11'; then
              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                echo "Detected transient failure. Waiting 15s before retry..."
                sleep 15
                ATTEMPT=$((ATTEMPT + 1))
                continue
              fi
              echo "Transient failures persisted after $MAX_ATTEMPTS attempts. Failing."
            fi

            echo "Playwright tests failed with status $STATUS. Not retrying."
            exit "$STATUS"
          done
        env:
          BASE_URL: http://localhost:3000
          SYSTEM_API_KEY: ephemeral-smoke-test-key

      - name: Upload Playwright results
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: staging-e2e-results
          path: test-results/
          retention-days: 7

  # CS53-20 — cold-start assertion smoke. The regular smoke-test job
  # tolerates cold-start 503s (polls /api/health until 200) but does NOT
  # *assert* that any 503+Retry-After actually fired, so a regression
  # that breaks the warmup-retry path could ship undetected. This job
  # boots the same image with the CS53-10 simulator turned on
  # (GWN_SIMULATE_COLD_START_FAILS=3) and asserts the warmup path is
  # exercised AND recovers within budget. Deliberately uses /healthz
  # (not /api/health) for the service-container readiness check because
  # /api/health touches the DB and would fail until the simulator's
  # 4th connect succeeds.
  cold-start-assert-smoke-test:
    name: Cold-start assertion smoke (CS53-20)
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    services:
      mssql:
        image: ghcr.io/henrik-me/mssql-server:2022-CU17-ubuntu-22.04
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "GwnTest1!"
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'GwnTest1!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

      app:
        image: ghcr.io/henrik-me/guesswhatisnext:${{ needs.build-and-push.outputs.image-tag }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        ports:
          - 3000:3000
        env:
          NODE_ENV: staging
          PORT: 3000
          JWT_SECRET: cs53-20-cold-start-secret
          SYSTEM_API_KEY: cs53-20-cold-start-key
          CANONICAL_HOST: localhost:3000
          DATABASE_URL: "Server=mssql,1433;Database=gwn;User Id=sa;Password=GwnTest1!;Encrypt=false;TrustServerCertificate=true"
          FEATURE_FLAG_ALLOW_OVERRIDE: "true"
          TRUST_PROXY: "2"
          # CS53-10 simulator — first 3 _connect() attempts throw transient
          # ETIMEOUT, 4th proceeds. Requires the arming gate; without it
          # the SIMULATE_* var is inert (audit-logged only).
          GWN_ENABLE_DB_CONNECT_SIMULATORS: "1"
          GWN_SIMULATE_COLD_START_FAILS: "3"
        options: >-
          --health-cmd "node -e \"const http = require('http'); const req = http.get('http://localhost:3000/healthz', {headers: {'X-Forwarded-Proto': 'https'}}, (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1));\""
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12
          --health-start-period 30s
    steps:
      - name: Create MSSQL database
        run: |
          echo "Creating gwn database in MSSQL..."
          docker exec ${{ job.services.mssql.id }} /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'GwnTest1!' -C \
            -Q "IF DB_ID('gwn') IS NULL CREATE DATABASE [gwn]"
          echo "Database gwn created."

      - name: Probe DB-touching endpoint and assert ≥1× 503+Retry-After then 200
        run: |
          set -euo pipefail
          URL="http://localhost:3000/api/scores/leaderboard?variant=freeplay"
          BUDGET_S=90
          INTERVAL_S=2
          DEADLINE=$(( $(date +%s) + BUDGET_S ))
          ATTEMPTS=0
          SAW_503=0
          FIRST_RETRY_AFTER=""
          FIRST_200_ELAPSED_S=""
          START=$(date +%s)
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            ATTEMPTS=$((ATTEMPTS + 1))
            HEADERS_FILE=$(mktemp)
            STATUS=$(curl -s -o /dev/null -D "$HEADERS_FILE" -w '%{http_code}' \
              --connect-timeout 5 --max-time 10 \
              -H "X-User-Activity: 1" -H "X-Forwarded-Proto: https" "$URL" || echo "000")
            ELAPSED=$(( $(date +%s) - START ))
            RETRY_AFTER=$(grep -i '^retry-after:' "$HEADERS_FILE" | head -1 | awk -F': ' '{print $2}' | tr -d '\r' || true)
            rm -f "$HEADERS_FILE"
            echo "  attempt ${ATTEMPTS} (+${ELAPSED}s): HTTP ${STATUS}${RETRY_AFTER:+ Retry-After=${RETRY_AFTER}}"
            if [ "$STATUS" = "503" ]; then
              SAW_503=1
              if [ -z "$FIRST_RETRY_AFTER" ] && [ -n "$RETRY_AFTER" ]; then
                FIRST_RETRY_AFTER="$RETRY_AFTER"
              fi
            elif [ "$STATUS" = "200" ]; then
              FIRST_200_ELAPSED_S="$ELAPSED"
              break
            fi
            sleep "$INTERVAL_S"
          done
          echo "Result: attempts=${ATTEMPTS} saw503=${SAW_503} firstRetryAfter=${FIRST_RETRY_AFTER:-<none>} first200ElapsedS=${FIRST_200_ELAPSED_S:-<never>}"
          if [ "$SAW_503" != "1" ]; then
            echo "::error::Cold-start retry path NOT exercised — never observed a 503. The simulator did not fire (env vars may not be plumbed through the image), or the warmup-retry path is broken."
            exit 1
          fi
          if [ -z "$FIRST_RETRY_AFTER" ]; then
            echo "::error::503 response did not include a Retry-After header — transient classifier or central error handler regression."
            exit 1
          fi
          if [ -z "$FIRST_200_ELAPSED_S" ]; then
            echo "::error::Never recovered to 200 within ${BUDGET_S}s — sim did not stop at limit (simulator counter regression?), or warmup-retry loop never reattempts init."
            exit 1
          fi
          echo "✅ CS53-20 cold-start assertion PASSED."

      - name: Audit — confirm CS53-10 simulator audit log fired (armed mode)
        # Belt-and-suspenders for KQL § B.16 + arming-gate regression cover.
        # The audit log line MUST carry `mode:"cold-start-fails"` (NOT
        # `mode:"unarmed:..."` — that would mean the arming gate broke and
        # the simulator silently no-op'd, while the probe still saw 503s
        # from the request gate's "not yet initialized" path: a real
        # false-negative that GPT-5.4 PR #305 R1 caught). And we expect
        # EXACTLY 3 matches (one per configured failure attempt;
        # GWN_SIMULATE_COLD_START_FAILS=3) — fewer means the gate broke,
        # more means the counter regressed.
        run: |
          set -euo pipefail
          LOGS=$(docker logs ${{ job.services.app.id }} 2>&1 || true)
          ARMED_MATCHES=$(printf '%s\n' "$LOGS" | grep -c '"mode":"cold-start-fails"' || true)
          UNARMED_MATCHES=$(printf '%s\n' "$LOGS" | grep -c '"mode":"unarmed:cold-start-fails"' || true)
          echo "Found ${ARMED_MATCHES} armed and ${UNARMED_MATCHES} unarmed cold-start-fails audit lines."
          if [ "$UNARMED_MATCHES" -gt 0 ]; then
            echo "::error::CS53-10 arming gate regression — saw mode=unarmed:cold-start-fails. The SIMULATE_* env reached the container but GWN_ENABLE_DB_CONNECT_SIMULATORS=1 did NOT, so the simulator is inert. The probe's 503s came from the request gate, NOT from a real simulator throw — meaning this assertion is effectively no-op."
            printf '%s\n' "--- last 100 lines of app stdout ---"
            printf '%s\n' "$LOGS" | tail -100
            exit 1
          fi
          if [ "$ARMED_MATCHES" -ne 3 ]; then
            echo "::error::Expected exactly 3 armed cold-start-fails audit lines (GWN_SIMULATE_COLD_START_FAILS=3); got ${ARMED_MATCHES}. Either the simulator counter regressed, the warmup-retry loop is over- or under-firing, or the env var was not picked up."
            printf '%s\n' "--- last 100 lines of app stdout ---"
            printf '%s\n' "$LOGS" | tail -100
            exit 1
          fi
          echo "✅ CS53-10 audit log present with mode=cold-start-fails ×3 — KQL § B.16 tripwire path is wired AND arming gate is honored."

  update-staging-branch:
    name: Fast-Forward release/staging
    needs: [smoke-test, cold-start-assert-smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Fast-forward release/staging to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create release/staging if it doesn't exist
          if ! git ls-remote --exit-code origin refs/heads/release/staging > /dev/null 2>&1; then
            echo "Creating release/staging branch"
            git checkout -b release/staging
            git push origin release/staging
          else
            echo "Fast-forwarding release/staging to main"
            git fetch origin release/staging
            git checkout release/staging
            git merge --ff-only origin/main
            git push origin release/staging
          fi

  deploy-azure-staging:
    name: Deploy to Azure Staging
    needs: [build-and-push, update-staging-branch]
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
    steps:
      # CS61-3 (D4): early secret preflight. Aborts the staging deploy
      # within seconds (before any Azure CLI mutation, before any container
      # update) if either secret required by the downstream CS61 seed step
      # or the CS41 smoke chain is unset. Per CS61-4 this is now the
      # SINGLE point of failure for missing secrets — the prior
      # skip-on-secret-missing branches in CS41-1/CS41-12/CS41-5 step
      # bodies have been removed (CS61-6 verification deploy run
      # 24976962804 confirmed the early preflight catches the only
      # failure mode they masked, and parity with prod-deploy.yml is
      # now restored).
      - name: Preflight — required secrets present (CS61-3)
        if: always()
        run: |
          missing=()
          if [ -z "${{ secrets.SMOKE_USER_PASSWORD_STAGING }}" ]; then
            missing+=("SMOKE_USER_PASSWORD_STAGING")
          fi
          if [ -z "${{ secrets.SYSTEM_API_KEY }}" ]; then
            missing+=("SYSTEM_API_KEY")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required secrets unset: ${missing[*]}. Set them before staging deploys can proceed. See OPERATIONS.md § Deploy gates (CS41) and CS61 plan."
            exit 1
          fi
          echo "✅ All required secrets present."

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure GHCR registry credentials
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            az containerapp registry set \
              --name gwn-staging \
              --resource-group gwn-rg \
              --server ghcr.io \
              --username ${{ vars.GHCR_USERNAME }} \
              --password ${{ secrets.GHCR_PAT }}

      - name: Ensure multiple revision mode
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            az containerapp revision set-mode \
              --name gwn-staging \
              --resource-group gwn-rg \
              --mode multiple

      - name: Deploy new revision (0% traffic)
        id: deploy
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            # Derive CANONICAL_HOST from STAGING_URL if not explicitly set
            if [ -z "$CANONICAL_HOST" ] && [ -n "$STAGING_URL" ]; then
              CANONICAL_HOST=$(echo "$STAGING_URL" | sed 's|^https\?://||' | sed 's|[/?#].*||' | sed 's|/$||')
              export CANONICAL_HOST
            fi
            if [ -z "$CANONICAL_HOST" ]; then
              echo "::error::CANONICAL_HOST not set. Configure vars.STAGING_URL or vars.CANONICAL_HOST in repository settings."
              exit 1
            fi
            echo "Using CANONICAL_HOST=$CANONICAL_HOST"

            # Check if container app is stopped and start it if needed
            APP_STATE=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
              --query "properties.runningStatus" -o tsv 2>/dev/null || echo "Unknown")
            echo "Container app state: $APP_STATE"
            if [ "$APP_STATE" != "Running" ]; then
              echo "Container app is not running — starting via REST API..."
              SUB_ID=$(az account show --query "id" -o tsv)
              az rest --method POST \
                --url "/subscriptions/$SUB_ID/resourceGroups/gwn-rg/providers/Microsoft.App/containerApps/gwn-staging/start?api-version=2024-03-01"
              echo "Waiting for container app to start..."
              for i in $(seq 1 12); do
                APP_STATE=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
                  --query "properties.runningStatus" -o tsv 2>/dev/null || echo "Unknown")
                echo "Start attempt $i/12: state=$APP_STATE"
                if [ "$APP_STATE" = "Running" ]; then
                  break
                fi
                sleep 10
              done
              if [ "$APP_STATE" != "Running" ]; then
                echo "::error::Container app failed to start after 120s (state: $APP_STATE)"
                exit 1
              fi
            fi

            # Find the revision currently receiving traffic (not just the latest-created one)
            CURRENT_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
              --query "properties.configuration.ingress.traffic[?weight > \`0\`] | [0].revisionName" -o tsv 2>/dev/null || echo "")
            if [ -z "$CURRENT_REV" ] || [ "$CURRENT_REV" = "None" ]; then
              CURRENT_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
                --query "properties.latestRevisionName" -o tsv 2>/dev/null || echo "")
            fi
            echo "current-revision=$CURRENT_REV" >> "$GITHUB_OUTPUT"
            echo "Current revision (rollback target): $CURRENT_REV"

            # Deploy with YAML template
            SUFFIX="deploy-$(date +%s)"
            TEMPLATE_FILE=$(mktemp)
            trap "rm -f $TEMPLATE_FILE" EXIT
            cat > "$TEMPLATE_FILE" <<YAMLEOF
            properties:
              template:
                revisionSuffix: $SUFFIX
                scale:
                  minReplicas: 0
                  maxReplicas: 1
                containers:
                  - name: gwn-staging
                    image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                    env:
                      - name: NODE_ENV
                        value: staging
                      - name: PORT
                        value: "3000"
                      - name: JWT_SECRET
                        value: "${JWT_SECRET}"
                      - name: SYSTEM_API_KEY
                        value: "${SYSTEM_API_KEY}"
                      - name: CANONICAL_HOST
                        value: "${CANONICAL_HOST}"
                      - name: GWN_DB_PATH
                        value: /tmp/game.db
                      - name: APPLICATIONINSIGHTS_CONNECTION_STRING
                        secretRef: appinsights-connection-string
                    resources:
                      cpu: 0.5
                      memory: 1Gi
            YAMLEOF
            az containerapp update \
              --name gwn-staging \
              --resource-group gwn-rg \
              --yaml "$TEMPLATE_FILE"

            # Get new revision name
            NEW_REV=$(az containerapp show --name gwn-staging --resource-group gwn-rg \
              --query "properties.latestRevisionName" -o tsv)
            if [ -z "$NEW_REV" ] || [ "$NEW_REV" = "None" ]; then
              echo "::error::Failed to get new revision name"
              exit 1
            fi
            echo "new-revision=$NEW_REV" >> "$GITHUB_OUTPUT"

            echo "New revision: $NEW_REV"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          CANONICAL_HOST: ${{ vars.CANONICAL_HOST }}
          STAGING_URL: ${{ vars.STAGING_URL }}

      # CS41-4: Apply DB migrations AFTER the new revision is deployed
      # (at 0% traffic) but BEFORE `traffic set` shifts traffic to it.
      # Per the v3 plan, staging uses multi-revision mode so this is the
      # correct gate point — a migration failure here aborts the deploy
      # without ever shifting traffic to the new revision.
      #
      # NOTE: the live Azure `gwn-staging` Container App currently runs
      # SQLite at /tmp/game.db (ephemeral, recreated on every revision).
      # If `secrets.STAGING_DATABASE_URL` is unset, the step is a documented
      # no-op; once staging moves to managed MSSQL the operator sets the
      # secret and migrations begin running automatically.
      - name: Checkout repo (for scripts/migrate.js)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (production only)
        run: npm ci --omit=dev

      # CS61-3 (b) prep: resolve the NEW revision's direct FQDN so the seed
      # step + migration assertion can target it before traffic shifts.
      # The existing "Get new revision FQDN (CS41-1)" step further down
      # captures the same FQDN as a step output (`steps.rev.outputs.fqdn`)
      # for the CS41-1 smoke; we resolve it early as an env var here so the
      # CS61-3 steps don't need to thread step outputs through them.
      - name: Resolve NEW revision FQDN (CS61-3 prep)
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            FQDN=$(az containerapp revision show \
              --name gwn-staging --resource-group gwn-rg \
              --revision "$NEW_REV" \
              --query "properties.fqdn" -o tsv)
            if [ -z "$FQDN" ] || [ "$FQDN" = "None" ]; then
              echo "::error::CS61-3: could not resolve FQDN for NEW revision $NEW_REV"
              exit 1
            fi
            echo "NEW_REVISION_FQDN=$FQDN" >> "$GITHUB_ENV"
            echo "Resolved NEW revision FQDN: $FQDN"

      # CS61-3 (b): seed `gwn-smoke-bot` against the NEW revision via the
      # CS61-1 admin endpoint BEFORE any CS41 smoke step runs. Staging uses
      # container-local SQLite at /tmp/game.db (see deploy step env), so
      # every new revision starts with an empty user table — the smoke-bot
      # must be created post-deploy, pre-smoke, on the NEW revision's
      # direct FQDN (apex still routes to OLD at this point). The endpoint
      # is idempotent (200/exists or 201/created); both are success.
      #
      # Healthz wait: 60 × 3s = 180s. The CS41 smoke uses
      # WARMUP_CAP_MS=30000 + COLD_START_MS=30000 = 60s allowance — 180s
      # here is comfortably above that to absorb container-app cold-start
      # variance plus DB self-init (the seed endpoint also touches the DB).
      - name: Seed gwn-smoke-bot via API (CS61-1)
        env:
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD_STAGING }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
        run: |
          if [ -z "$NEW_REVISION_FQDN" ]; then
            echo "::error::CS61-3: NEW_REVISION_FQDN unset (resolve step did not run?)"
            exit 1
          fi
          echo "Waiting for /healthz on $NEW_REVISION_FQDN before seeding..."
          HEALTHZ_OK=0
          for i in $(seq 1 60); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 5 "https://$NEW_REVISION_FQDN/healthz" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "/healthz ready after $((i * 3))s (HTTP $STATUS)"
              HEALTHZ_OK=1
              break
            fi
            sleep 3
          done
          if [ "$HEALTHZ_OK" -ne 1 ]; then
            echo "::error::CS61-1: /healthz on $NEW_REVISION_FQDN did not become ready within 180s; aborting staging deploy before seed"
            exit 1
          fi
          # CS61-3a — Force DB init before seed.
          # /api/admin/* paths bypass the cold-start gate (server/app.js:296),
          # so the seed endpoint can land while the DB is un-initialized and
          # 500 (e.g. SQLITE_ERROR: no such table: users). Calling
          # /api/admin/init-db first explicitly triggers runInit()
          # (server/app.js:531) and waits for it to complete (HTTP 200), so
          # the subsequent seed call lands against a ready DB. Identified
          # during the failed CS61-6 verification deploy (run 24971160848)
          # where every seed attempt returned HTTP 500 because of this.
          # Concurrency: runInit() shares an in-flight promise via
          # `initGuard` (server/app.js:145), so this call piggybacks on any
          # init already kicked off by the /healthz handler.
          echo "Forcing DB init via /api/admin/init-db (CS61-3a)..."
          INIT_OK=0
          for init_attempt in $(seq 1 12); do
            INIT_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              -X POST \
              -H "x-api-key: $SYSTEM_API_KEY" \
              "https://$NEW_REVISION_FQDN/api/admin/init-db")
            if [ "$INIT_STATUS" = "200" ]; then
              echo "✅ CS61-3a: DB init succeeded after ~$((init_attempt * 5))s (HTTP 200)"
              INIT_OK=1
              break
            fi
            echo "CS61-3a: init-db attempt $init_attempt/12 returned HTTP $INIT_STATUS; sleeping 5s before retry..."
            sleep 5
          done
          if [ "$INIT_OK" -ne 1 ]; then
            echo "::error::CS61-3a: /api/admin/init-db on $NEW_REVISION_FQDN did not return 200 within ~60s; aborting before seed"
            exit 1
          fi
          # CS61-1 seed loop — now lands against an initialized DB. The
          # 10×5s retry budget below is retained as defense-in-depth in
          # case of transient post-init flakiness.
          SEED_OK=0
          for attempt in $(seq 1 10); do
            if node scripts/seed-smoke-user-via-api.js "$NEW_REVISION_FQDN"; then
              SEED_OK=1
              break
            fi
            echo "Seed attempt $attempt/10 failed; sleeping 5s before retry (likely DB self-init in progress)..."
            sleep 5
          done
          if [ "$SEED_OK" -ne 1 ]; then
            echo "::error::CS61-1: seeding gwn-smoke-bot failed on $NEW_REVISION_FQDN after 10 attempts; aborting staging deploy"
            exit 1
          fi

      # CS61-3 (c): assert the NEW revision finished applying all DB
      # migrations cleanly. The `_tracker.runMigrations()` call happens at
      # server boot (server/app.js); this gate confirms it succeeded
      # against the NEW revision's container-local SQLite. status taxonomy
      # per CS61 plan v3 D2: only `ok` (applied === expected) is success;
      # `pending`/`ahead`/`error` all abort the deploy. (Note: `ahead` is
      # legitimate during rollback windows, but a fresh-deploy NEW revision
      # has the latest code and should never legitimately be `ahead`.)
      - name: Assert all migrations applied (CS61-2)
        env:
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
        run: |
          if [ -z "$NEW_REVISION_FQDN" ]; then
            echo "::error::CS61-3: NEW_REVISION_FQDN unset (resolve step did not run?)"
            exit 1
          fi
          response=$(curl -sk -H "x-api-key: $SYSTEM_API_KEY" --max-time 10 "https://$NEW_REVISION_FQDN/api/admin/migrations")
          echo "Migration tracker state: $response"
          status=$(echo "$response" | jq -r '.status // "missing"')
          if [ "$status" != "ok" ]; then
            applied=$(echo "$response" | jq -r '.applied // 0')
            expected=$(echo "$response" | jq -r '.expected // 0')
            lastError=$(echo "$response" | jq -r '.lastError // "null"')
            echo "::error::CS61-2: migration status is '$status' (applied=$applied/expected=$expected, lastError=$lastError); aborting staging deploy"
            exit 1
          fi
          echo "✅ All migrations applied (status=ok)."

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::notice::secrets.STAGING_DATABASE_URL is unset — staging is still on container-local SQLite. Skipping pre-deploy migration step. Set the secret once staging moves to managed MSSQL."
            echo "MIGRATION_STATUS=skipped" >> "$GITHUB_ENV"
            exit 0
          fi
          node scripts/migrate.js || {
            echo "::error::Migration failed; aborting deploy before traffic shift"
            echo "MIGRATION_STATUS=failed" >> "$GITHUB_ENV"
            exit 1
          }
          echo "MIGRATION_STATUS=applied" >> "$GITHUB_ENV"

      # CS41-12: smoke the OLD revision (still serving 100% of staging
      # traffic at the apex hostname) against the just-migrated DB BEFORE
      # we shift traffic to the new revision. Catches backward-incompatibility
      # the static linter (CS41-11) cannot see — subtle query-shape changes,
      # app-side schema introspection, trigger/index/default-value side effects.
      #
      # Skip conditions (each emits a notice, NOT a failure):
      #   - MIGRATION_STATUS != 'applied'  → no schema change occurred
      #     (staging still on SQLite, or migration step skipped).
      #   - steps.deploy.outputs.current-revision empty → first deploy ever.
      #
      # Note: SMOKE_USER_PASSWORD_STAGING absence is now caught by the
      # CS61-3 early preflight step at job start (CS61-4); the prior
      # mirror-CS41-1 skip branch in this step body was removed.
      #
      # Failure mode (smoke fails): the migration HAS been applied to staging
      # DB, but the OLD revision cannot serve against it. Aborting BEFORE
      # the traffic-shift step keeps users on the OLD code — but reads/writes
      # still hit the migrated schema, so this is degraded service. The
      # existing "Rollback on failure" step deactivates the new revision;
      # operator must EITHER promote the new revision manually OR hand-write
      # inverse SQL to revert the migration. See PR body operator playbook.
      - name: Resolve OLD revision FQDN (CS41-12 prep)
        if: env.MIGRATION_STATUS == 'applied' && steps.deploy.outputs.current-revision != ''
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            OLD_REV="${{ steps.deploy.outputs.current-revision }}"
            # In multi-revision mode, latestRevisionName already points at
            # the new (0% traffic) revision. The deploy step captured
            # current-revision from the apex traffic config — that is the
            # one still serving 100%. Use it directly.
            OLD_FQDN=$(az containerapp revision show \
              --name gwn-staging --resource-group gwn-rg \
              --revision "$OLD_REV" \
              --query "properties.fqdn" -o tsv 2>/dev/null || echo "")
            if [ -z "$OLD_FQDN" ] || [ "$OLD_FQDN" = "None" ]; then
              echo "::warning::Could not resolve FQDN for OLD revision $OLD_REV — CS41-12 will skip."
              echo "OLD_REVISION_FQDN=" >> "$GITHUB_ENV"
              echo "OLD_REVISION_NAME=" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "OLD_REVISION_FQDN=$OLD_FQDN" >> "$GITHUB_ENV"
            echo "OLD_REVISION_NAME=$OLD_REV" >> "$GITHUB_ENV"
            echo "Captured OLD revision: $OLD_REV ($OLD_FQDN)"

      # CS61-5: positive transition marker. Probe /api/admin/migrations
      # (CS61-2 endpoint, requireSystem auth) on the OLD revision before
      # CS41-12 OLD smoke runs. The route's PRESENCE — regardless of auth
      # outcome — proves the OLD revision is post-CS61-2; ABSENCE (HTTP
      # 404) proves the OLD revision pre-dates CS61 and the CS41-12 smoke
      # would necessarily fail (smoke-bot was never seeded into the OLD
      # revision's ephemeral SQLite). On 404, gracefully skip CS41-12 so
      # the first-deploy-after-CS61-3 transition succeeds; on the second
      # deploy CS41-12 runs naturally. See plan v3 § D3.
      #
      # NOTE: this marker only runs when CS41-12 itself would have run
      # (MIGRATION_STATUS == 'applied' && OLD_REVISION_FQDN != ''). When
      # those preconditions are absent, CS41-12's existing `if:` already
      # skips, so the marker has nothing to mark.
      - name: Detect CS61-aware OLD revision (CS41-12 transition marker)
        id: cs41-12-marker
        if: env.MIGRATION_STATUS == 'applied' && env.OLD_REVISION_FQDN != ''
        env:
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
        run: |
          if [ -z "$OLD_REVISION_FQDN" ]; then
            echo "::notice::CS61-5: OLD_REVISION_FQDN unset (first deploy ever); CS41-12 OLD smoke will skip naturally"
            echo "skip-old-smoke=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Probe /api/admin/migrations on OLD revision; route absence
          # (404) means pre-CS61. --max-time 10 keeps a hung OLD revision
          # from stalling the deploy; curl returns "000" on timeout/DNS
          # failure, which falls through to the unexpected-status arm.
          http_status=$(curl -sk -o /dev/null -w "%{http_code}" \
            -H "x-api-key: $SYSTEM_API_KEY" \
            --max-time 10 \
            "https://$OLD_REVISION_FQDN/api/admin/migrations")
          case "$http_status" in
            200|401|403)
              echo "✅ CS61-5: OLD revision is CS61-aware (HTTP $http_status from /api/admin/migrations); proceeding with CS41-12 smoke"
              echo "skip-old-smoke=false" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "::notice::CS61-5: OLD revision pre-dates CS61 (HTTP 404 from /api/admin/migrations); skipping CS41-12 OLD smoke for this transition deploy. Re-run after one transition deploy and CS41-12 will work."
              echo "skip-old-smoke=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::CS61-5: unexpected HTTP $http_status from /api/admin/migrations on OLD revision $OLD_REVISION_NAME ($OLD_REVISION_FQDN); cannot determine CS61-awareness. If OLD revision is broken/restarting, re-run the deploy; if persistent, investigate the OLD revision's health."
              exit 1
              ;;
          esac

      - name: Smoke OLD revision against NEW schema (CS41-12)
        if: env.MIGRATION_STATUS == 'applied' && env.OLD_REVISION_FQDN != '' && steps.cs41-12-marker.outputs.skip-old-smoke != 'true'
        env:
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD_STAGING }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          WARMUP_CAP_MS: '30000'
          COLD_START_MS: '30000'
          PERF_WARN_MS: '2000'
        run: |
          if [ -z "$SMOKE_USER_PASSWORD" ]; then
            echo "::error::secrets.SMOKE_USER_PASSWORD_STAGING is unset; cannot run CS41-12 old-revision smoke. The CS61-3 preflight should have caught this — investigate why it did not."
            exit 1
          fi
          node scripts/smoke.js "$OLD_REVISION_FQDN" || {
            echo "::error::CS41-12: MIGRATION BREAKS OLD STAGING SERVER — aborting before traffic shift"
            echo "::error::Migration applied to staging DB, but old revision $OLD_REVISION_NAME cannot serve against the new schema."
            echo "::error::Operator action: either promote the new revision manually (az containerapp ingress traffic set --revision-weight $NEW_REV=100) OR revert the migration with hand-written inverse SQL. See PR body operator playbook."
            exit 1
          }
          echo "✅ CS41-12: OLD revision $OLD_REVISION_NAME serves cleanly against the migrated schema."

      # CS41-1 + CS41-2: smoke the new revision against its DIRECT FQDN
      # BEFORE shifting traffic. Failure here aborts the deploy with no
      # traffic shift — the existing rollback step (`if: failure()`) handles
      # the cleanup. Direct-FQDN probes are critical: hitting the public
      # ingress hostname here would either route to the old revision (0%
      # traffic still on new) or interleave both, defeating the purpose.
      - name: Get new revision FQDN (CS41-1)
        id: rev
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            FQDN=$(az containerapp revision show \
              --name gwn-staging --resource-group gwn-rg \
              --revision "$NEW_REV" \
              --query "properties.fqdn" -o tsv)
            if [ -z "$FQDN" ] || [ "$FQDN" = "None" ]; then
              echo "::error::Could not resolve FQDN for revision $NEW_REV"
              exit 1
            fi
            echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
            echo "Smoke target FQDN: $FQDN"

      - name: Smoke deployed revision (CS41-1+2)
        id: smoke
        env:
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD_STAGING }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          WARMUP_CAP_MS: '30000'
          COLD_START_MS: '30000'
          PERF_WARN_MS: '2000'
          SMOKE_RESULTS_PATH: smoke-results.json
        run: |
          if [ -z "$SMOKE_USER_PASSWORD" ]; then
            echo "::error::secrets.SMOKE_USER_PASSWORD_STAGING is unset; cannot run CS41-1 smoke. The CS61-3 preflight should have caught this — investigate why it did not. Operator action: set the secret per OPERATIONS.md."
            exit 1
          fi
          set +e
          node scripts/smoke.js "${{ steps.rev.outputs.fqdn }}"
          SMOKE_EXIT=$?
          set -e
          echo "smoke-exit=$SMOKE_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$SMOKE_EXIT" -ne 0 ]; then
            echo "::error::CS41-1 smoke failed against $NEW_REV — aborting BEFORE traffic shift."
            exit 1
          fi

      - name: AI telemetry verification (CS41-3)
        id: ai-verify
        # Only run when smoke succeeded (no point checking AI ingest of a
        # smoke that didn't exercise the new revision). `continue-on-error`
        # is critical: per CS41-3 plan, AI ingest delay is warning-only and
        # MUST NOT block the deploy. The dedicated annotation step inside
        # scripts/verify-ai.js surfaces the warning to the workflow run
        # summary; a true mechanism failure (auth/network) would set
        # `result.error` but still not block the deploy here.
        if: steps.smoke.outputs.smoke-exit == '0'
        continue-on-error: true
        env:
          NEW_REVISION_NAME: ${{ steps.deploy.outputs.new-revision }}
          AI_RESOURCE: gwn-ai-staging
          RESOURCE_GROUP: gwn-rg
          EXPECTED_ROW_COUNT: '6'
          AI_VERIFY_OUTPUT_PATH: ai-verification.json
        run: node scripts/verify-ai.js


      - name: Upload AI verification artifact (CS41-3)
        if: always() && hashFiles('ai-verification.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ai-verification-staging-${{ github.run_id }}
          path: ai-verification.json
          retention-days: 90

      - name: Upload smoke results artifact (CS41-8)
        if: always() && hashFiles('smoke-results.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: smoke-results-staging-${{ github.run_id }}
          path: smoke-results.json
          retention-days: 90

      - name: Switch traffic to new revision
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            echo "Switching 100% traffic to $NEW_REV"
            az containerapp ingress traffic set \
              --name gwn-staging --resource-group gwn-rg \
              --revision-weight "$NEW_REV=100"

      - name: Deactivate old revisions
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            if [ -z "$NEW_REV" ] || [ "$NEW_REV" = "None" ]; then
              echo "::error::NEW_REV is invalid — skipping deactivation to avoid taking app offline"
              exit 1
            fi
            echo "Deactivating all revisions except $NEW_REV..."
            az containerapp revision list --name gwn-staging --resource-group gwn-rg \
              --query "[?properties.active && name != '$NEW_REV'].name" -o tsv | while read -r rev; do
              echo "Deactivating: $rev"
              az containerapp revision deactivate --name gwn-staging --resource-group gwn-rg \
                --revision "$rev" || true
            done
            sleep 15

      - name: Verify staging deployment
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            echo "Waiting for revision $NEW_REV to reach Running state..."
            for i in $(seq 1 10); do
              STATE=$(az containerapp revision show \
                --name gwn-staging --resource-group gwn-rg \
                --revision "$NEW_REV" \
                --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "Attempt $i: state=$STATE"
              if echo "$STATE" | grep -qiE "^Running"; then
                break
              fi
              sleep 10
            done
            if ! echo "$STATE" | grep -qiE "^Running"; then
              echo "::error::Revision $NEW_REV not Running after 100s (state: $STATE)"
              exit 1
            fi
            echo "Revision is running — verifying DB initialization via application logs..."
            # Self-init budget: 2s initial delay + up to 30 × (2s busy_timeout + 5s
            # interval) ≈ 212s, plus Azure log propagation latency (~30s).
            # 60 × 5s = 300s gives comfortable slack beyond that ceiling.
            DB_CONFIRMED=0
            for i in $(seq 1 60); do
              if ! LOGS=$(az containerapp logs show \
                --name gwn-staging --resource-group gwn-rg \
                --revision "$NEW_REV" \
                --type console --tail 100 2>&1); then
                echo "Log query failed, retrying..."
                sleep 5
                continue
              fi
              if echo "$LOGS" | grep -qE "Database (self-initialized|initialized)"; then
                echo "✅ Staging deployment verified — DB initialization confirmed in logs"
                DB_CONFIRMED=1
                break
              fi
              echo "DB init not confirmed yet (attempt $i/60)..."
              sleep 5
            done
            if [ "$DB_CONFIRMED" -ne 1 ]; then
              echo "::error::DB initialization not confirmed in application logs after 300s"
              exit 1
            fi

      # CS41-9: deploy summary renders AFTER traffic shift so it can report
      # the post-cutover state (success path) or — via `if: always()` — the
      # pre-cutover abort state (failure path; smoke / AI verify / verify
      # staging failed and we never shifted traffic). Either way, the summary
      # surfaces the right verdict in the workflow run summary.
      - name: Render deploy summary (CS41-8)
        if: always()
        env:
          IMAGE_SHA: ${{ env.IMAGE_TAG }}
          REVISION_NAME: ${{ steps.deploy.outputs.new-revision }}
          MIGRATION_STATUS: ${{ env.MIGRATION_STATUS }}
          ENVIRONMENT: staging
          AI_VERIFICATION_PATH: ai-verification.json
        run: |
          if [ -f smoke-results.json ]; then
            node scripts/render-deploy-summary.js smoke-results.json >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Deploy Summary"
              echo ""
              echo "- **Environment:** `staging`"
              echo "- **Image SHA:** `${IMAGE_SHA}`"
              echo "- **Revision:** `${REVISION_NAME:-unknown}`"
              echo "- **Migration:** ${MIGRATION_STATUS:-N/A}"
              echo "- **Smoke verdict:** ⚠️ smoke skipped or did not produce results"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # CS41-7: per-deploy AI ingest summary. Runs on BOTH success and
      # failure paths (failed deploys still generated some traffic before
      # failing). `continue-on-error: true` is mandatory — a metric query
      # failure must NEVER block or rollback a deploy. Window is bounded
      # by `gh run list` against the previous successful run of this
      # workflow; on first deploy of staging we fall back to 24h.
      # Output: `ingest-delta.json` (uploaded as 90-day artifact below)
      # and a markdown section appended to the workflow run summary.
      - name: Compute AI ingest delta (CS41-7)
        if: success() || failure()
        continue-on-error: true
        env:
          ENV: staging
          WORKFLOW: ${{ github.workflow }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/compute-ingest-delta.js > ingest-delta.json
          node scripts/render-ingest-section.js ingest-delta.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ingest delta artifact (CS41-7)
        if: always() && hashFiles('ingest-delta.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ingest-delta-staging-${{ github.run_id }}
          path: ingest-delta.json
          retention-days: 90

      - name: Rollback on failure
        if: failure() && steps.deploy.outputs.current-revision != ''
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            CURRENT_REV="${{ steps.deploy.outputs.current-revision }}"
            if [ -z "$CURRENT_REV" ] || [ "$CURRENT_REV" = "None" ]; then
              echo "::error::CURRENT_REV is invalid ('$CURRENT_REV') — cannot rollback safely"
              exit 1
            fi
            echo "::warning::Rolling back to $CURRENT_REV"
            # Reactivate old revision first so there's always at least one
            # active revision. Pre-self-init revisions will need manual
            # POST /api/admin/init-db to resume API service (one-time transition risk).
            az containerapp revision activate --name gwn-staging --resource-group gwn-rg \
              --revision "$CURRENT_REV" || true
            # Wait for old revision to reach Running state before proceeding
            ROLLBACK_READY=0
            for attempt in 1 2 3 4 5; do
              STATE=$(az containerapp revision show \
                --name gwn-staging --resource-group gwn-rg \
                --revision "$CURRENT_REV" \
                --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "::notice::Rollback target $CURRENT_REV state=$STATE (attempt $attempt/5)"
              if echo "$STATE" | grep -qiE "^Running"; then
                ROLLBACK_READY=1
                break
              fi
              sleep 10
            done
            if [ "$ROLLBACK_READY" -ne 1 ]; then
              echo "::warning::Rollback target $CURRENT_REV not Running yet — proceeding anyway"
            fi
            # --- Step 1: Switch traffic away from the failed revision first ---
            # This must happen BEFORE deactivating the new revision, otherwise
            # ingress would briefly point at an inactive revision (downtime).
            TRAFFIC_SET=0
            for attempt in 1 2 3; do
              if az containerapp ingress traffic set \
                --name gwn-staging --resource-group gwn-rg \
                --revision-weight "$CURRENT_REV=100"; then
                TRAFFIC_SET=1
                break
              fi
              echo "::warning::Failed to set traffic to $CURRENT_REV (attempt $attempt/3); retrying in 10s..."
              sleep 10
            done
            if [ "$TRAFFIC_SET" -ne 1 ]; then
              echo "::error::Failed to set traffic to $CURRENT_REV after 3 attempts"
              exit 1
            fi
            # Allow Azure ingress routing to propagate before deactivating
            sleep 10
            # --- Step 2: Deactivate the failed new revision ---
            NEW_REV="${{ steps.deploy.outputs.new-revision }}"
            if [ -n "$NEW_REV" ] && [ "$NEW_REV" != "None" ] && [ "$NEW_REV" != "$CURRENT_REV" ]; then
              az containerapp revision deactivate --name gwn-staging --resource-group gwn-rg \
                --revision "$NEW_REV" || true
            fi

      # CS41-5: rollback verification with explicit revision targeting.
      # After the existing rollback step has shifted staging traffic back to
      # the prior revision and deactivated the failed new revision, this
      # step re-runs the CS41-1 smoke and CS41-3 AI verify AGAINST the
      # rolled-back revision specifically. Two independent reasons:
      #   1. Confirm the rollback actually produced a healthy serving state —
      #      otherwise the apex is in an indeterminate condition (both new
      #      and rollback revision broken) and an operator must intervene.
      #   2. Tag AI telemetry to the rollback revision's `cloud_RoleInstance`
      #      so post-incident forensics can distinguish rollback-driven
      #      requests from the failed deploy's earlier requests.
      #
      # AI verify here is warning-only (same contract as CS41-3): a delayed
      # AI ingest does NOT undo a successful rollback smoke. Smoke failure,
      # however, is a HARD failure with a distinct operator-grep marker
      # ("ROLLBACK TARGET ALSO UNHEALTHY") to differentiate this incident
      # mode from CS41-12's "MIGRATION BREAKS OLD STAGING SERVER" — operator
      # playbook is different.
      # CS41-5 prep: resolve the rollback target's revision name + FQDN
      # ONCE and export to $GITHUB_ENV so both the CS61-5a transition marker
      # and the CS41-5 smoke step can reference them. Mirrors the
      # "Capture old revision" → CS61-5 marker → CS41-12 smoke shape used
      # for the forward path.
      - name: Resolve rollback target revision (CS41-5 prep)
        if: failure() && steps.deploy.outputs.current-revision != ''
        run: |
          # Allow Azure ingress to settle on the rolled-back revision after
          # the rollback step's `traffic set` + `sleep 10`. Small additional
          # buffer protects against revision-list lag.
          sleep 15

          ROLLBACK_REVISION_NAME=$(az containerapp show \
            --name gwn-staging --resource-group gwn-rg \
            --query "properties.configuration.ingress.traffic[?weight==\`100\`].revisionName | [0]" -o tsv 2>/dev/null || echo "")
          ROLLBACK_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "ROLLBACK_TIMESTAMP=$ROLLBACK_TIMESTAMP" >> "$GITHUB_ENV"

          if [ -z "$ROLLBACK_REVISION_NAME" ] || [ "$ROLLBACK_REVISION_NAME" = "None" ]; then
            echo "::warning::CS41-5: could not resolve rollback revision name (no traffic at weight=100). Skipping rollback verification — operator must verify manually."
            echo "ROLLBACK_REVISION_NAME=" >> "$GITHUB_ENV"
            echo "ROLLBACK_REVISION_FQDN=" >> "$GITHUB_ENV"
            exit 0
          fi

          ROLLBACK_FQDN=$(az containerapp revision show \
            --name gwn-staging --resource-group gwn-rg \
            --revision "$ROLLBACK_REVISION_NAME" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")
          if [ -z "$ROLLBACK_FQDN" ] || [ "$ROLLBACK_FQDN" = "None" ]; then
            echo "::warning::CS41-5: could not resolve FQDN for rollback revision $ROLLBACK_REVISION_NAME. Skipping rollback verification — operator must verify manually."
            echo "ROLLBACK_REVISION_NAME=$ROLLBACK_REVISION_NAME" >> "$GITHUB_ENV"
            echo "ROLLBACK_REVISION_FQDN=" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "ROLLBACK_REVISION_NAME=$ROLLBACK_REVISION_NAME" >> "$GITHUB_ENV"
          echo "ROLLBACK_REVISION_FQDN=$ROLLBACK_FQDN" >> "$GITHUB_ENV"
          echo "::notice::CS41-5: rollback target revision=$ROLLBACK_REVISION_NAME fqdn=$ROLLBACK_FQDN at $ROLLBACK_TIMESTAMP"

      # CS61-5a: positive transition marker for the ROLLBACK path. Mirrors
      # CS61-5 (CS41-12 transition marker) exactly, just probing the
      # rollback target's FQDN instead of the OLD revision's. Without this
      # marker, on the first post-CS61 deploy the rollback target is a
      # pre-CS61 revision (no smoke-bot seeded) → CS41-5's smoke would
      # 401-login-fail → false-positive "ROLLBACK TARGET ALSO UNHEALTHY"
      # annotation. Probe route presence to decide whether the rollback
      # target supports CS41-5 smoke. See plan v3 § D3 (extension).
      - name: Detect CS61-aware ROLLBACK target (CS41-5 transition marker)
        id: cs41-5-marker
        if: failure() && env.ROLLBACK_REVISION_FQDN != ''
        env:
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
        run: |
          if [ -z "$ROLLBACK_REVISION_FQDN" ]; then
            echo "::notice::CS61-5a: no ROLLBACK_REVISION_FQDN (no rollback target?); CS41-5 will skip naturally"
            echo "skip-rollback-smoke=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Probe /api/admin/migrations on the rollback target; route
          # absence (404) means pre-CS61. --max-time 10 keeps a hung
          # rollback target from stalling the workflow; curl returns "000"
          # on timeout/DNS failure, which falls through to the
          # unexpected-status arm.
          http_status=$(curl -sk -o /dev/null -w "%{http_code}" \
            -H "x-api-key: $SYSTEM_API_KEY" \
            --max-time 10 \
            "https://$ROLLBACK_REVISION_FQDN/api/admin/migrations")
          case "$http_status" in
            200|401|403)
              echo "✅ CS61-5a: ROLLBACK target is CS61-aware (HTTP $http_status from /api/admin/migrations); proceeding with CS41-5 smoke"
              echo "skip-rollback-smoke=false" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "::notice::CS61-5a: ROLLBACK target pre-dates CS61 (HTTP 404 from /api/admin/migrations); skipping CS41-5 smoke for this transition. After one full post-CS61 deploy cycle, all rollback targets will support CS41-5 smoke."
              echo "skip-rollback-smoke=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::CS61-5a: unexpected HTTP $http_status from /api/admin/migrations on ROLLBACK target $ROLLBACK_REVISION_NAME ($ROLLBACK_REVISION_FQDN); cannot determine CS61-awareness. If rollback target is broken/restarting, re-run the deploy; if persistent, investigate the rollback target's health."
              exit 1
              ;;
          esac

      - name: Rollback verification (CS41-5)
        if: failure() && env.ROLLBACK_REVISION_FQDN != '' && steps.cs41-5-marker.outputs.skip-rollback-smoke != 'true'
        env:
          SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD_STAGING }}
          SYSTEM_API_KEY: ${{ secrets.SYSTEM_API_KEY }}
          WARMUP_CAP_MS: '30000'
          COLD_START_MS: '30000'
          PERF_WARN_MS: '2000'
          AI_RESOURCE: gwn-ai-staging
          RESOURCE_GROUP: gwn-rg
          EXPECTED_ROW_COUNT: '6'
        run: |
          if [ -z "$SMOKE_USER_PASSWORD" ]; then
            echo "::error::CS41-5: SMOKE_USER_PASSWORD_STAGING is unset; cannot run rollback smoke. The CS61-3 preflight should have caught this — investigate why it did not."
            exit 1
          fi

          # 1. Smoke against the rollback target. If THIS fails, both the
          # new revision (deploy-time smoke) AND the rollback target are
          # broken — indeterminate state; operator must intervene.
          if ! SMOKE_RESULTS_PATH=rollback-smoke-results.json node scripts/smoke.js "$ROLLBACK_REVISION_FQDN"; then
            echo "::error::CS41-5: ROLLBACK TARGET ALSO UNHEALTHY — operator intervention required"
            echo "::error::Rolled-back revision $ROLLBACK_REVISION_NAME failed CS41-1 smoke at $ROLLBACK_TIMESTAMP."
            echo "::error::Service is in an indeterminate state: both the new revision (failed deploy) and the rollback target are broken."
            echo "::error::Do NOT auto-roll-forward — operator must investigate. See PR body operator playbook for CS41-5."
            exit 1
          fi

          # 2. AI verify on the rollback target (warning-only, mirrors CS41-3).
          set +e
          NEW_REVISION_NAME="$ROLLBACK_REVISION_NAME" \
          AI_VERIFY_OUTPUT_PATH=rollback-ai-verification.json \
            node scripts/verify-ai.js
          AI_EXIT=$?
          set -e
          if [ "$AI_EXIT" -ne 0 ]; then
            echo "::warning::CS41-5: AI verification mechanism failed for rollback target $ROLLBACK_REVISION_NAME (exit $AI_EXIT). Rollback smoke succeeded; investigate AI access path separately."
          elif [ -f rollback-ai-verification.json ] && grep -q '"warning":[[:space:]]*true' rollback-ai-verification.json; then
            echo "::warning::CS41-5: AI ingest delayed for rollback target $ROLLBACK_REVISION_NAME — rollback succeeded but AI not yet reflecting rolled-back traffic. Investigate AI separately if delay persists > 15 min."
          fi

          echo "✅ CS41-5: rollback verification passed against $ROLLBACK_REVISION_NAME (smoke ok; AI exit=$AI_EXIT)"

      - name: Upload rollback smoke results artifact (CS41-5)
        if: always() && hashFiles('rollback-smoke-results.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: rollback-smoke-results-staging-${{ github.run_id }}
          path: rollback-smoke-results.json
          retention-days: 90

      - name: Upload rollback AI verification artifact (CS41-5)
        if: always() && hashFiles('rollback-ai-verification.json') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: rollback-ai-verification-staging-${{ github.run_id }}
          path: rollback-ai-verification.json
          retention-days: 90

      - name: Tag deployment
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          inlineScript: |
            REVISION=$(az containerapp show --name gwn-staging --resource-group gwn-rg --query "properties.latestRevisionName" -o tsv)
            echo "Tagging commit as: $REVISION"
            echo "REVISION=$REVISION" >> "$GITHUB_ENV"

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Push deployment tag
        run: |
          git tag "$REVISION" "${{ github.sha }}"
          git push origin "$REVISION"
          echo "✅ Tagged ${{ github.sha }} as $REVISION"
