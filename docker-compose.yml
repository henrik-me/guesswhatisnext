services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Dev/test defaults only — not used in production. Production values are in GitHub Secrets.
      - NODE_ENV=development
      - JWT_SECRET=gwn-dev-secret-change-in-production
      - SYSTEM_API_KEY=gwn-dev-system-key
      - PORT=3000
    restart: unless-stopped
