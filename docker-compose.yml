services:
  app:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      # Dev/test defaults only — not used in production. Production values are in GitHub Secrets.
      - NODE_ENV=development
      - JWT_SECRET=gwn-dev-secret-change-in-production
      - SYSTEM_API_KEY=test-system-api-key
      - PORT=3000
      # - GWN_DB_DELAY_MS=15000  # Uncomment to simulate DB cold start delay
    restart: unless-stopped
