services:
  mssql:
    # Pin to specific CU tag for reproducible builds. Update process:
    # 1. Check latest CU at https://learn.microsoft.com/en-us/sql/linux/sql-server-linux-release-notes-2022
    # 2. Update tag below
    # 3. Test locally: docker compose -f docker-compose.mssql.yml up --build
    # 4. Optional GHCR mirror: docker tag mcr.microsoft.com/mssql/server:<tag> ghcr.io/henrik-me/mssql-server:<tag> && docker push
    image: mcr.microsoft.com/mssql/server:2022-CU17-ubuntu-22.04
    environment:
      ACCEPT_EULA: "Y"
      # Local MSSQL validation default only — not a real secret. Override via MSSQL_SA_PASSWORD env var.
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-GwnTest1!}
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    environment:
      NODE_ENV: production
      # Local MSSQL validation defaults only — not real secrets. Production uses Azure-managed secrets.
      JWT_SECRET: gwn-docker-mssql-validation
      SYSTEM_API_KEY: test-system-api-key
      CANONICAL_HOST: "localhost"
      # Allow feature flag query param overrides (e.g. ?ff_submit_puzzle=true)
      # so E2E tests can control flags per-test, matching SQLite E2E behavior.
      # See INSTRUCTIONS.md "Feature flag testing across environments" (CS40).
      FEATURE_FLAG_ALLOW_OVERRIDE: "true"
      # Trust 2 proxy hops: browser→Caddy (sets XFF) → Express (socket).
      # Default is 1 (Azure has a single proxy). Docker Caddy adds one more.
      TRUST_PROXY: "2"
      DATABASE_URL: "Server=mssql,1433;Database=gwn;User Id=sa;Password=${MSSQL_SA_PASSWORD:-GwnTest1!};Encrypt=false;TrustServerCertificate=true"
      PORT: "3000"
      # Cold-start simulation hook (CS53 / Policy 2). When set to a positive
      # integer (ms), the FIRST mssql-adapter _connect() after process start
      # sleeps for that duration before contacting the server, mimicking
      # Azure SQL serverless auto-pause resume timing. Off by default; set
      # by `npm run container:validate` to exercise the warmup path on
      # every container restart. Only for local container validation; never
      # set in real dev/staging/prod environments.
      GWN_SIMULATE_COLD_START_MS: "${GWN_SIMULATE_COLD_START_MS:-}"
      # CS53-10 — DB-unavailable + cold-start-fails simulators.
      # GWN_ENABLE_DB_CONNECT_SIMULATORS=1: arming gate (REQUIRED — without
      #   this, the SIMULATE_* vars below are inert and only audit-logged).
      #   Lives in compose so a real Container Apps deployment that copies
      #   the SIMULATE_* vars but not the gate cannot turn the live DB into
      #   a fake-failure surface.
      # GWN_SIMULATE_COLD_START_FAILS=N: first N _connect() attempts throw a
      #   synthetic ConnectionError/ETIMEOUT (transient → 503+Retry-After);
      #   N+1th proceeds. Validates the slow-retry init loop + isTransientDbError.
      # GWN_SIMULATE_DB_UNAVAILABLE=capacity_exhausted: every _connect() throws
      #   the verbatim Azure SQL Free Tier "paused for the remainder of the
      #   month" error (ELOGIN). getDbUnavailability classifies it →
      #   503 + {unavailable:true,reason:'capacity-exhausted'} no Retry-After.
      # GWN_SIMULATE_DB_UNAVAILABLE=transient: every _connect() throws ETIMEOUT
      #   (forever transient, never recovers — for retry-cap testing).
      # All off by default; only enabled by `npm run container:validate --mode=*`
      # or by individual unit tests.
      GWN_ENABLE_DB_CONNECT_SIMULATORS: "${GWN_ENABLE_DB_CONNECT_SIMULATORS:-}"
      GWN_SIMULATE_COLD_START_FAILS: "${GWN_SIMULATE_COLD_START_FAILS:-}"
      GWN_SIMULATE_DB_UNAVAILABLE: "${GWN_SIMULATE_DB_UNAVAILABLE:-}"
      GWN_ENV: "${GWN_ENV:-}"
      APPLICATIONINSIGHTS_CONNECTION_STRING: "${APPLICATIONINSIGHTS_CONNECTION_STRING:-}"
      # OTLP exporter endpoint for the local collector. telemetry.js uses this
      # OTLP HTTP fallback path only when APPLICATIONINSIGHTS_CONNECTION_STRING is unset.
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    volumes:
      - ./scripts/docker-mssql-entrypoint.sh:/app/docker-mssql-entrypoint.sh:ro
    entrypoint: ["sh", "/app/docker-mssql-entrypoint.sh"]
    depends_on:
      mssql:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-3001}:80"
    volumes:
      - ./infra/Caddyfile.local:/etc/caddy/Caddyfile:ro
      # CS53-15: persist Caddy local CA + issued certs across container recreates.
      # Without these, every `docker compose up --force-recreate caddy` (or `app`,
      # which restarts caddy too via depends_on) regenerates a fresh self-signed
      # CA. The browser still trusts the OLD CA, so subsequent fetches fail with
      # ERR_CERT_AUTHORITY_INVALID. Service-Worker background fetches then throw
      # silently (SW cannot prompt for cert acceptance), the SW catch handler
      # returns a synthetic 503, and the SPA shows an "infinite retry" banner
      # despite the server being healthy.
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    # Run as root so the file exporter can write to the named volume.
    # This is a local dev/test stack only — production uses Azure Monitor.
    user: "0:0"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
      - otel-data:/data

volumes:
  otel-data:
  caddy-data:
  caddy-config:
